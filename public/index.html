<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ТТ Алем</title>
<style>
:root{--bg:#f6f5f2;--card:#fff;--ink:#1c1c1a;--mut:#8a8880;--line:#e4e2db;--acc:#1d6e56;--accbg:#e2f3ec;--red:#b3362e;--redbg:#fbeceb;--amb:#9a6b10;--ambbg:#faf0da;--blu:#1d4f8f;--blubg:#e5eefb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;padding-bottom:76px}
header{position:sticky;top:0;background:var(--bg);padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;z-index:5;border-bottom:1px solid var(--line)}
header h1{font-size:17px;font-weight:600}
header .who{font-size:12px;color:var(--mut)}
main{padding:12px 12px 20px;max-width:680px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.card.tap{cursor:pointer}
.card.tap:active{opacity:.85}
.cbody{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.grn{background:var(--acc)}
.btn.red{background:var(--red)}
.btn:disabled{opacity:.35}
.sm{font-size:13px;padding:8px 12px;width:auto;display:inline-block}
input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:var(--card);color:var(--ink)}
input.big{font-size:26px;font-weight:600;text-align:center}
label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
.row{display:flex;gap:8px}.row>*{flex:1}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.ok{background:var(--accbg);color:var(--acc)}.bad{background:var(--redbg);color:var(--red)}.warn{background:var(--ambbg);color:var(--amb)}.info{background:var(--blubg);color:var(--blu)}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:5}
nav button{flex:1;padding:9px 2px 11px;border:none;background:none;font-size:10px;color:var(--mut);cursor:pointer}
nav button.on{color:var(--ink);font-weight:600}
nav button .ic{font-size:18px;display:block;margin-bottom:2px}
.li{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:8px}
.li:last-child{border:none}
.li .nm{flex:1;font-size:14px}
.li .vl{font-weight:600;font-size:14px;white-space:nowrap}
.sub{font-size:11px;color:var(--mut)}
h2{font-size:14px;font-weight:600;margin:4px 0 10px}
.step{display:flex;align-items:center;gap:8px}
.step button{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:20px;cursor:pointer}
.step span{min-width:40px;text-align:center;font-size:19px;font-weight:600}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;z-index:99;opacity:0;transition:.25s;max-width:92%;text-align:center}
.toast.show{opacity:1}
.alert-bar{background:var(--redbg);border:1px solid #f0b8b5;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:var(--red)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:16px auto}
.pinpad button{padding:17px;font-size:21px;border:1px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer}
.dots{text-align:center;font-size:28px;letter-spacing:10px;min-height:36px}
.search{position:relative;margin-bottom:10px}
.search input{padding-left:36px}
.search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.srlist{background:var(--card);border:1px solid var(--line);border-radius:10px;max-height:260px;overflow-y:auto}
.sritem{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--line);font-size:15px}
.sritem:last-child{border:none}
.sritem:active{background:var(--bg)}
.tabbar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.tabbar button{padding:8px 14px;border-radius:99px;border:1px solid var(--line);background:var(--card);font-size:13px;white-space:nowrap;cursor:pointer}
.tabbar button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chev{font-size:11px;color:var(--mut);transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(90deg)}
.done{background:var(--accbg);border:1px solid #bfe3d4;border-radius:14px;padding:14px;margin-bottom:10px;text-align:center}
.hl{font-size:12px;color:var(--mut);margin:14px 0 5px;font-weight:600}
/* таблица остатков */
.stock-table{width:100%;border-collapse:collapse;font-size:13px}
.stock-table th{background:var(--bg);padding:8px 6px;text-align:right;font-weight:600;border-bottom:1px solid var(--line)}
.stock-table th:first-child{text-align:left}
.stock-table td{padding:8px 6px;text-align:right;border-bottom:1px solid var(--line)}
.stock-table td:first-child{text-align:left;font-size:13px}
.stock-table tr:last-child td{border:none}
.neg{color:var(--red)}.pos{color:var(--acc)}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
let TOKEN = sessionStorage.getItem('tok') || '';
let ME = JSON.parse(sessionStorage.getItem('me') || 'null');
let D = { products: [], stock: {}, sklads: [], alerts: [] };
let screen = 'work';
let pin = '', pickedUser = null;
let exp = {}, busy = false;
// per-screen state
let wSel = null, wDone = null, wQ = '';
let pCnt = {}, pDate = null, pQ = '';
let stockTab = '', nomTab = 'raw', recFilter = 'all';
let outFrom = null, outTo = null;
let syncDate = null;
let woItems = [], woQ = '';
let moveQ = '', movePid = null, moveFrom = '', moveTo = '';
let invQ = '', invTab = 'form';

const $ = s => document.querySelector(s);
const app = $('#app');
const fmt = n => (Math.round((+n||0)*100)/100).toLocaleString('ru-RU');
const money = n => fmt(n) + ' ₸';
const today = () => new Date().toISOString().slice(0,10);
const P = id => D.products.find(p => p.id === id) || {name:'?',unit:'',recipe:[],type:'raw'};
const SK = id => D.sklads.find(s => s.id === id) || {name:id||'—'};
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ROLE = {cook:'повар',cook_prep:'повар заготовок',cook_sand:'повар сэндвичей',cook_hot:'повар горячего',cook_baker:'пекарь',cook_pastry:'кондитер',cook_head:'главный повар',tech:'менеджер',admin:'директор'};
const isCook = r => r==='cook'||r.startsWith('cook_');
const hasRecipe = p => p&&p.recipe&&p.recipe.length>0;
const CATS = [
  {id:'raw',icon:'🛒',name:'Продукты'},
  {id:'process',icon:'⚖️',name:'Выработка'},
  {id:'semi',icon:'🧊',name:'Полуфабрикаты'},
  {id:'bread',icon:'🍞',name:'Хлеб и тесто'},
  {id:'dish',icon:'🥪',name:'Готовые блюда'},
];
const CAT = id => CATS.find(c=>c.id===id)||{icon:'📦',name:id};
const ST = {
  draft:     '<span class="pill warn">✏️ черновик</span>',
  submitted: '<span class="pill info">📨 у менеджера</span>',
  approved:  '<span class="pill ok">✅ утверждена</span>',
};
const UNITS = ['кг','г','шт','л','мл'];

function toast(msg,ms){ const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms||2400); }
async function api(path,method,body){
  const r=await fetch('/api'+path,{method:method||'GET',headers:{'Content-Type':'application/json','x-token':TOKEN},body:body?JSON.stringify(body):undefined});
  const j=await r.json();
  if(r.status===401&&ME){logout();throw new Error('Сессия истекла');}
  if(!r.ok) throw new Error(j.error||'Ошибка');
  return j;
}
function logout(){TOKEN='';ME=null;sessionStorage.clear();pickedUser=null;pin='';render();}
async function reload(){ D=await api('/bootstrap'); if(!stockTab&&D.sklads.length) stockTab=D.sklads[0].id; }
function opTime(o){return new Date(o.ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});}

// ====== свернуть/развернуть ======
window.toggle=key=>{exp[key]=!exp[key];renderInPlace();};
function card(key,hdr,body,cls){
  const open=exp[key];
  return `<div class="card tap ${cls||''}" onclick="toggle('${key}')">
    <div style="display:flex;justify-content:space-between;align-items:center">${hdr}<span class="chev ${open?'open':''}">▶</span></div>
    ${open?`<div class="cbody" onclick="event.stopPropagation()">${body}</div>`:''}
  </div>`;
}

// ====== поиск ======
function searchBox(id,q,ph){
  return `<div class="search"><input id="${id}" placeholder="${ph||'Поиск...'}" value="${esc(q)}" oninput="onSearch('${id}',this.value)" autocomplete="off"></div>`;
}
window.onSearch=(id,v)=>{
  if(id==='wq') wQ=v;
  else if(id==='pq') pQ=v;
  else if(id==='woq') woQ=v;
  else if(id==='mvq') moveQ=v;
  else if(id==='invq') invQ=v;
  renderInPlace();
};
function filter(list,q){ const lo=q.toLowerCase(); return lo?list.filter(p=>p.name.toLowerCase().includes(lo)):list; }

// ====== ВХОД ======
async function renderLogin(){
  const users=await(await fetch('/api/users')).json();
  if(!pickedUser){
    app.innerHTML=`<main style="padding-top:40px">
      <h1 style="text-align:center;font-size:22px;margin-bottom:4px">ТТ Алем</h1>
      <p style="text-align:center;color:var(--mut);font-size:14px;margin-bottom:24px">Кто вы?</p>
      ${users.map(u=>`<button class="btn sec" style="margin-bottom:10px;padding:16px;text-align:left" onclick="pickUser('${u.id}')">${esc(u.name)} <span class="sub">· ${ROLE[u.role]||u.role}</span></button>`).join('')}
    </main>`;
    return;
  }
  app.innerHTML=`<main style="padding-top:40px;text-align:center">
    <h1 style="font-size:20px">${esc(pickedUser.name)}</h1>
    <p style="color:var(--mut);font-size:14px;margin:6px 0 10px">Введите PIN</p>
    <div class="dots" id="dots"></div>
    <div class="pinpad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinKey(${n})">${n}</button>`).join('')}
      <button onclick="pickedUser=null;pin='';render()" style="font-size:14px">Назад</button>
      <button onclick="pinKey(0)">0</button>
      <button onclick="pin=pin.slice(0,-1);drawDots()" style="font-size:16px">⌫</button>
    </div>
  </main>`;
  drawDots();
}
window.pickUser=id=>fetch('/api/users').then(r=>r.json()).then(us=>{pickedUser=us.find(u=>u.id===id);pin='';render();});
function drawDots(){const d=$('#dots');if(d)d.textContent='●'.repeat(pin.length);}
window.pinKey=async n=>{
  pin+=n;drawDots();
  if(pin.length===4){
    try{
      const r=await api('/login','POST',{userId:pickedUser.id,pin});
      TOKEN=r.token;ME=r.user;
      sessionStorage.setItem('tok',TOKEN);sessionStorage.setItem('me',JSON.stringify(ME));
      screen=isCook(ME.role)?'work':ME.role==='tech'?'rec':'cost';
      await reload();render();
    }catch(e){toast(e.message);pin='';drawDots();}
  }
};

// ====== КАРКАС ======
const NAVS={
  cook:       [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['rec','📖','Рецептуры'],['stock','📋','Остатки']],
  cook_prep:  [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['rec','📖','Рецептуры'],['stock','📋','Остатки']],
  cook_sand:  [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['rec','📖','Рецептуры'],['stock','📋','Остатки']],
  cook_hot:   [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['rec','📖','Рецептуры'],['stock','📋','Остатки']],
  cook_baker: [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['rec','📖','Рецептуры'],['stock','📋','Остатки']],
  cook_pastry:[['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['rec','📖','Рецептуры'],['stock','📋','Остатки']],
  cook_head:  [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['rec','📖','Рецептуры'],['stock','📋','Остатки'],['move','🔄','Переместить']],
  tech:       [['nom','🏷️','Продукты'],['rec','📖','Рецептуры'],['wo','🧂','Специи'],['output','📊','Выработка'],['stock','📋','Остатки']],
  admin:      [['cost','💰','Калькуляция'],['output','📊','Выработка'],['stock','📋','Остатки'],['sync','🔄','1С']],
};
function alertBar(){
  const al=D.alerts||[];
  if(!al.length) return '';
  return `<div class="alert-bar">⚠️ ${al.length} расхождени${al.length===1?'е':'й'} в остатках · <a href="#" onclick="showAlerts();return false" style="color:var(--red)">смотреть</a> · <a href="#" onclick="readAlerts();return false" style="color:var(--red)">ОК</a></div>`;
}
function shell(inner){
  const navs=NAVS[ME.role]||NAVS.admin;
  const alertHtml=(D.alerts&&D.alerts.length&&(ME.role==='admin'||ME.role==='tech'))?alertBar():'';
  const navHtml=navs.map(function(n){return '<button class="'+(screen===n[0]?'on':'')+'" onclick="go(\''+n[0]+'\')">'+'<span class="ic">'+n[1]+'</span>'+n[2]+'</button>';}).join('');
  app.innerHTML='<header><h1>ТТ Алем</h1><span class="who">'+esc(ME.name)+' · '+(ROLE[ME.role]||ME.role)+' · <a href="#" onclick="logout();return false" style="color:var(--mut)">выйти</a></span></header>'
    +'<main id="m">'+alertHtml+inner+'</main>'
    +'<nav>'+navHtml+'</nav>';
}
window.go=async s=>{screen=s;wSel=null;wDone=null;exp={};await reload();render();};
window.logout=logout;
window.showAlerts=()=>{ const al=D.alerts||[]; alert('Расхождения остатков:\n\n'+al.map(a=>a.msg).join('\n')); };
window.readAlerts=async()=>{ try{await api('/alerts/read','POST');await reload();renderInPlace();}catch(e){toast(e.message);} };

function renderInPlace(){
  const fn=SCREENS[screen]; if(!fn) return;
  const out=fn();
  if(out instanceof Promise) out.then(h=>{if($('#m'))$('#m').innerHTML=h;}).catch(e=>{if($('#m'))$('#m').innerHTML=`<p class="sub">${esc(e.message)}</p>`;});
  else if($('#m'))$('#m').innerHTML=out;
}

// ====== ПОВАР: ОБРАБОТКА ======
async function scrWork(){
  const procs=D.products.filter(p=>p.type==='process'&&p.sourceId);
  const filtered=filter(procs,wQ);
  const myOps=await api('/ops?date='+today()+'&type=processing&mine=1');
  const hist=myOps.length?`<div class="hl">Обработано сегодня:</div>
    ${myOps.slice().reverse().map(o=>card('hw'+o.id,
      `<span><b>${esc(P(o.rawId).name)}</b> → ${esc(P(o.semiId).name)} <span class="sub">${opTime(o)}</span></span>`,
      `${fmt(o.qtyBefore)} → ${fmt(o.qtyAfter)} ${P(o.rawId).unit} · потери ${o.lossPct}%`
    )).join('')}`:'';

  if(wDone){
    const d=wDone;wDone=null;
    return `<div class="done"><div style="font-size:34px">✅</div>
      <b>Записано!</b><br>${esc(P(d.rawId).name)}: ${fmt(d.qtyBefore)} → ${fmt(d.qtyAfter)} ${P(d.rawId).unit}<br>
      <span class="sub">Потери ${d.lossPct}% · ${opTime(d)}</span></div>
    <button class="btn" onclick="wSel=null;wQ='';render()">Обработать ещё</button>${hist}`;
  }
  if(!wSel){
    return `${searchBox('wq',wQ,'Найти продукт для обработки...')}
    ${filtered.map(s=>{
      const raw=P(s.sourceId);
      return `<div class="card tap" onclick="wPick('${s.id}')"><b>${esc(raw.name)}</b> → ${esc(s.name)}</div>`;
    }).join('')||'<p class="sub">Ничего не найдено.</p>'}${hist}`;
  }
  const s=P(wSel),raw=P(s.sourceId);
  return `<button class="btn sec sm" onclick="wSel=null;render()">← Назад</button>
  <div class="card" style="margin-top:10px">
    <span class="pill ok">${esc(raw.name)} → ${esc(s.name)}</span>
    <label>Вес ДО обработки, ${raw.unit}</label>
    <input class="big" id="wb" type="number" step="0.01" inputmode="decimal" oninput="wCalc()">
    <label>Вес ПОСЛЕ обработки, ${raw.unit}</label>
    <input class="big" id="wa" type="number" step="0.01" inputmode="decimal" oninput="wCalc()">
    <div id="wloss" style="margin:12px 0;text-align:center;font-size:15px;color:var(--mut)">Введите оба веса</div>
    <button class="btn" id="wgo" disabled onclick="wSave()">Записать</button>
  </div>${hist}`;
}
window.wPick=id=>{wSel=id;render();};
window.wCalc=()=>{
  const b=+$('#wb').value,a=+$('#wa').value,el=$('#wloss'),btn=$('#wgo');
  if(b>0&&a>0&&a<=b){el.innerHTML=`Потери: <b>${((1-a/b)*100).toFixed(1)}%</b>`;btn.disabled=false;}
  else if(a>b){el.textContent='Вес ПОСЛЕ больше ДО — проверьте';btn.disabled=true;}
  else{el.textContent='Введите оба веса';btn.disabled=true;}
};
window.wSave=async()=>{
  if(busy)return;
  const s=P(wSel),b=+$('#wb').value,a=+$('#wa').value;
  if(!s.sourceId){toast('У этого продукта не указан исходный (настройте в Продуктах у менеджера)');busy=false;return;}
  try{
    busy=true;$('#wgo').disabled=true;
    const recent=await api('/ops?date='+today()+'&type=processing&mine=1');
    const dup=recent.find(o=>o.semiId===wSel&&(Date.now()-new Date(o.ts))<10*60*1000);
    if(dup&&!confirm('Вы уже записывали «'+P(dup.rawId).name+'» в '+opTime(dup)+'.\n\nЭто НОВАЯ партия?')){
      busy=false;if($('#wgo'))$('#wgo').disabled=false;return;
    }
    const r=await api('/ops','POST',{type:'processing',rawId:s.sourceId,semiId:wSel,qtyBefore:b,qtyAfter:a});
    wDone=r;wSel=null;render();
  }catch(e){toast(e.message);if($('#wgo'))$('#wgo').disabled=false;}
  busy=false;
};

// ====== ПОВАР: ВЫПУСК ======
async function scrProd(){
  const approved=D.products.filter(p=>hasRecipe(p)&&p.recipeStatus==='approved');
  const filtered=filter(approved,pQ);
  const date=pDate||today();
  const dayOps=await api('/ops?date='+date+'&type=production');
  const anyCnt=Object.values(pCnt).some(v=>v>0);
  return `<h2>Выпуск готовой продукции</h2>
  <div class="search" style="margin-bottom:10px"><input id="pqinput" placeholder="Найти блюдо..." value="${esc(pQ)}" oninput="pQ=this.value;document.querySelectorAll('.prod-item').forEach(el=>{el.style.display=el.dataset.name.includes(this.value.toLowerCase())?'':'none'})" autocomplete="off"></div>
  ${approved.length?`<div class="card">
  ${approved.map(d=>`<div class="li prod-item" data-name="${d.name.toLowerCase()}" style="${pQ&&!d.name.toLowerCase().includes(pQ.toLowerCase())?'display:none':''}">
    <span class="nm">${CAT(d.type).icon} ${esc(d.name)}</span>
    <span class="step">
      <button onclick="pStep('${d.id}',-1)">−</button>
      <span>${pCnt[d.id]||0}</span>
      <button onclick="pStep('${d.id}',1)">+</button>
    </span>
  </div>`).join('')}
  </div>
  <button class="btn" ${anyCnt?'':'disabled'} onclick="pSave()">Записать выпуск</button>`
  :'<p class="sub">Нет утверждённых рецептур. Проверьте раздел «Рецептуры».</p>'}
  <div class="hl">Выпущено за <input type="date" value="${date}" onchange="pDate=this.value;render()" style="width:auto;padding:4px 8px;font-size:12px;display:inline-block">:</div>
  ${dayOps.length?dayOps.slice().reverse().map(o=>card('ph'+o.id,
    `<span><b>${CAT(P(o.productId).type).icon} ${esc(P(o.productId).name)} × ${fmt(o.count)}</b> <span class="sub">${opTime(o)}</span></span>`,
    P(o.productId).recipe.map(it=>`<div class="sub">${esc(P(it.productId).name)}: ${fmt(it.qty)} ${P(it.productId).unit}</div>`).join('')
  )).join(''):'<p class="sub">В этот день выпуска не было.</p>'}`;
}

function recRows(p,depth){
  depth=depth||0;
  return(p.recipe||[]).map(it=>{
    const c=P(it.productId),nested=hasRecipe(c),key='ri'+p.id+it.productId;
    const unitLabel=c.unit==='кг'||c.unit==='л'?'('+fmt(it.qty)+' г/мл или '+fmt(it.qty/1000)+' '+c.unit+')':'';
    return `<div class="li" style="padding-left:${depth*14}px" ${nested?`onclick="toggle('${key}');event.stopPropagation()"`:''}>
      <span class="nm">${nested?`<span class="chev ${exp[key]?'open':''}">▶</span> `:''}${esc(c.name)}${nested?' <span class="pill ok" style="font-size:10px">рецепт</span>':''}
      ${it.noteRaw?`<div class="sub">Excel: ${esc(it.noteRaw)} / ${esc(it.noteDone)}</div>`:''}
      </span><span class="vl">${fmt(it.qty)} ${c.unit}</span></div>
    ${nested&&exp[key]?`<div style="background:var(--bg);border-radius:8px;padding:6px 10px;margin-left:${depth*14}px">${recRows(c,depth+1)}</div>`:''}`;
  }).join('');
}
function canEdit(p){
  const st=p.recipeStatus||'draft';
  if(ME.role==='admin') return true;
  if(st==='approved') return false;
  if(st==='submitted') return ME.role==='tech';
  return true;
}
function scrRec(){
  const all=D.products.filter(p=>hasRecipe(p));

  const list=recFilter==='all'?all:all.filter(p=>(p.recipeStatus||'draft')===recFilter);
  const grouped={};
  list.forEach(p=>{if(!grouped[p.type])grouped[p.type]=[];grouped[p.type].push(p);});
  return `<div class="tabbar">
    ${[['all','Все ('+all.length+')'],['draft','✏️ ('+counts.draft+')'],['submitted','📨 ('+counts.submitted+')'],['approved','✅ ('+counts.approved+')']].map(t=>`<button class="${recFilter===t[0]?'on':''}" onclick="recFilter='${t[0]}';renderInPlace()">${t[1]}</button>`).join('')}
  </div>
  ${CATS.filter(cat=>grouped[cat.id]&&grouped[cat.id].length).map(cat=>`
    <div class="hl">${cat.icon} ${cat.name}</div>
    ${grouped[cat.id].map(p=>{
      const st=p.recipeStatus||'draft',open=exp['r'+p.id];
      return card('r'+p.id,
        `<span style="flex:1"><b>${esc(p.name)}</b> ${ST[st]} ${!canEdit(p)?'🔒':''} <span class="sub">${esc(SK(p.skladId).name)}</span></span>

        `<div style="background:var(--bg);border-radius:8px;padding:8px 10px">${recRows(p)}</div>
         ${st==='draft'&&isCook(ME.role)?`<button class="btn grn" style="margin-top:8px" onclick="event.stopPropagation();recStatus('${p.id}','submit','Передать менеджеру? После этого вы не сможете менять.')">Передать менеджеру →</button>`:''}
         ${st!=='approved'&&ME.role==='tech'?`<button class="btn grn" style="margin-top:8px" onclick="event.stopPropagation();recStatus('${p.id}','approve','Утвердить рецептуру?')">✅ Утвердить</button>`:''}`,

async function scrStock(){

  const stockData=await api('/report/stock');
  if(isMgrAdmin){
    // таблица продукт × склад

    let totalVal=0;
    if(showMoney) stockData.forEach(r=>{ Object.values(r.bySkl||{}).forEach(s=>{totalVal+=s.value||0;}); });
    return `${showMoney?`<div class="card" style="display:flex;justify-content:space-between"><span>Стоимость всех остатков</span><b>${money(totalVal)}</b></div>`:''}
    ${CATS.filter(cat=>byType[cat.id]).map(cat=>card('stcat'+cat.id,

          const rowSum=Object.values(r.bySkl||{}).reduce((a,s)=>a+s.value,0);
          return `<tr><td>${esc(r.name)}</td>${skls.map(s=>{
            const sl=r.bySkl&&r.bySkl[s.id];
            const qty=sl?sl.qty:0;
            return `<td class="${qty<0?'neg':qty>0?'pos':''}">${qty?fmt(qty)+' '+r.unit:'—'}</td>`;
          }).join('')}${showMoney?`<td>${money(rowSum)}</td>`:''}</tr>`;
        }).join('')}
      </table></div>`
    )).join('')||'<p class="sub">Остатков нет.</p>'}
    <button class="btn sec" style="margin-top:8px" onclick="go('inv')">Инвентаризация</button>
    <button class="btn sec" style="margin-top:8px" onclick="go('invhist')">История инвентаризаций</button>`;

  const skls=D.sklads.filter(s=>!s.is1cMain);

  <div class="card">
  ${filtered.map(r=>{
    const qty=stockTab?(r.bySkl&&r.bySkl[stockTab]?r.bySkl[stockTab].qty:0):r.total.qty;
    return `<div class="li"><span class="nm">${CAT(r.type).icon} ${esc(r.name)}</span>
      <span class="vl ${qty<0?'neg':''}">${fmt(qty)} ${r.unit}</span></div>`;

    <label>Код в 1С</label><input id="gc" value="${esc(p.code1c||'')}">
    <div style="height:12px"></div>
    <button class="btn" onclick="nomSave('${id||''}')">Сохранить</button>
  </div>`;
};
window.nomSave=async id=>{
  const body={type:$('#gt').value,unit:$('#gu').value,sourceId:$('#gs').value||null,code1c:$('#gc').value.trim(),skladId:$('#gsk').value};
  if(!$('#gn').disabled)body.name=$('#gn').value.trim();
  if(body.name==='')return toast('Введите наименование');
  try{
    if(id)await api('/products/'+id,'PUT',body);else await api('/products','POST',body);
    toast('Сохранено');await reload();render();
  }catch(e){toast(e.message);}
};

// ====== ДИРЕКТОР: КАЛЬКУЛЯЦИЯ ======
async function scrCost(){
  const data=await api('/report/costing');
  const grouped={};
  data.forEach(d=>{if(!grouped[d.type])grouped[d.type]=[];grouped[d.type].push(d);});
  return `<h2>Себестоимость сейчас</h2>
  <p class="sub" style="margin-bottom:10px">Из последних цен закупа. Нажмите строку — раскроется состав.</p>
  ${CATS.filter(cat=>grouped[cat.id]).map(cat=>`
    <div class="hl">${cat.icon} ${cat.name}</div>
    ${grouped[cat.id].map(d=>card('c'+d.productId,
      `<span style="flex:1"><b>${esc(d.name)}</b> ${ST[d.status]} <span class="sub">${esc(SK(D.products.find(x=>x.id===d.productId)?.skladId).name)}</span></span>
       <b>${money(d.total)}<span class="sub">/${d.unit}</span></b>`,
      `<div style="background:var(--bg);border-radius:8px;padding:8px 10px">${d.items.map(i=>`<div class="li">
        <span class="nm">${esc(i.name)}${i.hasRecipe?' <span class="pill ok" style="font-size:10px">рецепт</span>':''}
        <div class="sub">${fmt(i.qty)} ${i.unit} × ${money(i.unitCost)}/${i.unit}</div></span>
        <span class="vl">${money(i.cost)}</span></div>`).join('')}</div>
      <div class="row" style="margin-top:8px">
        <button class="btn sec sm" onclick="event.stopPropagation();showLog('${d.productId}','${esc(d.name)}')">📜 История</button>
        ${d.status==='approved'
          ?`<button class="btn sec sm" onclick="event.stopPropagation();recStatus('${d.productId}','reopen','Вернуть на доработку?')">🔓 На доработку</button>`
          :`<button class="btn sec sm" onclick="event.stopPropagation();recStatus('${d.productId}','approve','Утвердить?')">✅ Утвердить</button>`}
      </div>`
    )).join('')}`).join('')||'<p class="sub">Нет рецептур.</p>'}`;
}
window.showLog=async(id,name)=>{
  try{
    const log=await api('/recipes/'+id+'/log');
    const lines=log.slice().reverse().map(l=>new Date(l.ts).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})+' · '+l.user+': '+l.text).join('\n');
    alert('История «'+name+'»:\n\n'+(lines||'изменений не было'));
  }catch(e){toast(e.message);}
};

// ====== ВЫРАБОТКА ======
async function scrOutput(){
  const from=outFrom||today(),to=outTo||today();
  const r=await api('/report/output?from='+from+'&to='+to);
  const isAdmin=ME.role==='admin';
  const uStr=bu=>Object.entries(bu).map(([n,v])=>`${esc(n)}: ${typeof v==='object'?fmt(v.before)+'→'+fmt(v.after):fmt(v)}`).join(' · ');
  return `<h2>Выработка за период</h2>
  <div class="card"><div class="row">
    <div><label>С</label><input type="date" value="${from}" onchange="outFrom=this.value;render()"></div>
    <div><label>По</label><input type="date" value="${to}" onchange="outTo=this.value;render()"></div>
  </div>
  <div class="row" style="margin-top:8px">
    <button class="btn sec sm" onclick="outSet(0)">Сегодня</button>
    <button class="btn sec sm" onclick="outSet(7)">Неделя</button>
    <button class="btn sec sm" onclick="outSet(30)">Месяц</button>
  </div></div>
  <h2>Обработка</h2>
  ${r.processing.length?r.processing.map(m=>card('op'+m.raw+m.semi,
    `<span style="flex:1"><b>${esc(m.raw)} → ${esc(m.semi)}</b></span>
     <span class="pill ${m.avgLossPct>35?'bad':m.avgLossPct>20?'warn':'ok'}">потери ${m.avgLossPct}%</span>`,
    `<div class="sub">${fmt(m.totalBefore)} → ${fmt(m.totalAfter)} ${m.unit} · операций: ${m.operations}</div><div class="sub">${uStr(m.byUser)}</div>`
  )).join(''):'<p class="sub">Нет данных.</p>'}
  <h2 style="margin-top:14px">Выпуск</h2>
  ${r.production.length?r.production.map(m=>card('pp'+m.name,
    `<span style="flex:1"><b>${esc(m.name)}</b></span><b>${fmt(m.count)} ${m.unit}</b>`,
    `<div class="sub">${isAdmin&&m.sum!==undefined?'на сумму '+money(m.sum)+' · ':''}${uStr(m.byUser)}</div>`
  )).join(''):'<p class="sub">Нет данных.</p>'}`;
}
window.outSet=days=>{const d=new Date();outTo=d.toISOString().slice(0,10);d.setDate(d.getDate()-days);outFrom=d.toISOString().slice(0,10);render();};

// ====== 1С ======
async function scrSync(){
  const d=syncDate||today();
  const r=await api('/1c/export?date='+d);
  const S=D.settings||{};
  const raws=D.products.filter(p=>p.type==='raw');
  return `<h2>Обмен с 1С</h2>
  ${card('sklset','<span style="flex:1"><b>⚙️ Настройки складов 1С</b></span>',
    D.sklads.map(s=>`<div class="li"><span class="nm">${esc(s.name)}</span>
      <input data-skid="${s.id}" data-skfield="code1c" placeholder="код в 1С" value="${esc(s.code1c||'')}" style="width:120px" onchange="sklFieldSave(this)" onclick="event.stopPropagation()">
    </div>`).join('')+`<div style="height:8px"></div>
    <label>Порог уведомления об остатках, %</label>
    <input id="diffpct" type="number" value="${S.diffThresholdPct||5}" style="width:100px" onclick="event.stopPropagation()">
    <button class="btn sec sm" style="margin-top:8px" onclick="event.stopPropagation();saveSettings()">Сохранить</button>`
  )}
  <div class="card">
    <label>Дата выгрузки</label>
    <input type="date" value="${d}" onchange="syncDate=this.value;render()">
    <div style="height:8px"></div>
    <p style="font-size:13px">Документов: <b>${r.Документы.length}</b></p>
    ${r.Документы.map(doc=>card('doc'+doc.Время+doc.ВидДокумента,
      `<span style="flex:1"><b>${esc(doc.Комментарий)}</b></span><span class="sub">${doc.Время}</span>`,
      `<div class="sub">${doc.ВидДокумента}${doc.Склад?' · '+esc(doc.Склад):''}${doc.СкладОтправитель?' · '+esc(doc.СкладОтправитель)+' → '+esc(doc.СкладПолучатель):''}</div>`
    )).join('')||'<p class="sub">За эту дату операций нет.</p>'}
    <div style="height:8px"></div>
    <button class="btn sec" onclick="syncCopy()">Скопировать JSON для 1С</button>
  </div>
  ${card('rcpt','<span style="flex:1"><b>📦 Ручной ввод поступления</b></span><span class="sub">до подключения 1С</span>',
    `<label>Продукт</label><select id="rp">${raws.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select>
     <label>Склад прихода</label><select id="rsk">${D.sklads.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select>
     <div class="row"><div><label>Количество</label><input class="big" id="rq" type="number" step="0.01" inputmode="decimal" onclick="event.stopPropagation()"></div>
     <div><label>Цена ₸/ед.</label><input class="big" id="rc" type="number" step="0.01" inputmode="decimal" onclick="event.stopPropagation()"></div></div>
     <div style="height:10px"></div>
     <button class="btn" onclick="event.stopPropagation();rSave()">Оприходовать</button>`
  )}`;
}
window.sklFieldSave=async el=>{
  const id=el.dataset.skid,field=el.dataset.skfield,val=el.value.trim();
  try{await api('/sklads/'+id,'PUT',{[field]:val});}catch(e){toast(e.message);}
};
window.saveSettings=async()=>{
  try{await api('/settings','PUT',{diffThresholdPct:+$('#diffpct').value||5});toast('Сохранено');}catch(e){toast(e.message);}
};
window.syncCopy=async()=>{
  const r=await api('/1c/export?date='+(syncDate||today()));
  await navigator.clipboard.writeText(JSON.stringify(r,null,1));
  toast('JSON скопирован');
};
window.rSave=async()=>{
  const q=+$('#rq').value,c=+$('#rc').value;
  if(!(q>0)||!(c>0))return toast('Заполните количество и цену');
  try{await api('/ops','POST',{type:'receipt',productId:$('#rp').value,skladId:$('#rsk').value,qty:q,price:c});toast('✅ Приход записан');await reload();render();}
  catch(e){toast(e.message);}
};

// ====== РОУТЕР ======
const SCREENS={work:scrWork,prod:scrProd,rec:scrRec,stock:scrStock,inv:scrInv,invhist:scrInvHist,move:scrMove,wo:scrWo,nom:scrNom,cost:scrCost,output:scrOutput,sync:scrSync};
async function render(){
  if(!ME)return renderLogin();
  const fn=SCREENS[screen]||scrStock;
  const out=fn();
  shell(out instanceof Promise?'<p class="sub">Загрузка…</p>':out);
  if(out instanceof Promise){
    try{$('#m').innerHTML=await out;}
    catch(e){$('#m').innerHTML=`<p class="sub">${esc(e.message)}</p>`;}
  }
}
(async()=>{
  if(ME){try{await reload();}catch(e){logout();return;}}
  render();
})();
</script>
</body>
</html>
