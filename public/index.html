<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ТТ Алем — кухня</title>
<style>
:root{--bg:#f6f5f2;--card:#fff;--ink:#1c1c1a;--mut:#8a8880;--line:#e4e2db;--acc:#1d6e56;--accbg:#e2f3ec;--red:#b3362e;--redbg:#fbeceb;--amb:#9a6b10;--ambbg:#faf0da}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;padding-bottom:76px}
header{position:sticky;top:0;background:var(--bg);padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;z-index:5;border-bottom:1px solid var(--line)}
header h1{font-size:17px;font-weight:600}
header .who{font-size:13px;color:var(--mut)}
main{padding:14px 14px 20px;max-width:640px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-size:17px;font-weight:600;cursor:pointer}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn:disabled{opacity:.35}
input,select{width:100%;padding:13px;border:1px solid var(--line);border-radius:10px;font-size:17px;background:var(--card);color:var(--ink)}
input.big{font-size:26px;font-weight:600;text-align:center}
label{display:block;font-size:13px;color:var(--mut);margin:12px 0 5px}
.row{display:flex;gap:10px}.row>*{flex:1}
.pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600}
.ok{background:var(--accbg);color:var(--acc)}.bad{background:var(--redbg);color:var(--red)}.warn{background:var(--ambbg);color:var(--amb)}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:5}
nav button{flex:1;padding:10px 2px 12px;border:none;background:none;font-size:11px;color:var(--mut);cursor:pointer}
nav button.on{color:var(--ink);font-weight:600}
nav button .ic{font-size:20px;display:block;margin-bottom:2px}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:12px 2px;border-bottom:1px solid var(--line);gap:8px}
.list-item:last-child{border:none}
.list-item .nm{flex:1;font-size:15px}
.list-item .vl{font-weight:600;font-size:15px;white-space:nowrap}
.sub{font-size:12px;color:var(--mut)}
h2{font-size:15px;font-weight:600;margin:4px 0 10px}
.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:42px;height:42px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:22px;cursor:pointer}
.stepper span{min-width:44px;text-align:center;font-size:20px;font-weight:600}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:99px;font-size:14px;z-index:99;opacity:0;transition:.25s;max-width:90%;text-align:center}
.toast.show{opacity:1}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:16px auto}
.pinpad button{padding:18px;font-size:22px;border:1px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer}
.dots{text-align:center;font-size:28px;letter-spacing:10px;min-height:38px}
.userbtn{padding:16px;font-size:17px;text-align:left}
.tabbar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tabbar button{padding:10px 16px;border-radius:99px;border:1px solid var(--line);background:var(--card);font-size:14px;white-space:nowrap;cursor:pointer}
.tabbar button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.small{font-size:13px;padding:9px 12px;width:auto;display:inline-block}
.neg{color:var(--red)}
.done{background:var(--accbg);border:1px solid #bfe3d4;border-radius:14px;padding:16px;margin-bottom:12px;text-align:center}
.done .big-ico{font-size:34px}
.recipe-box{background:var(--bg);border-radius:10px;padding:8px 12px;margin:8px 0 4px}
.rec-mark{color:var(--acc);font-weight:600}
.hist-title{font-size:13px;color:var(--mut);margin:18px 0 6px;font-weight:600}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
let TOKEN = sessionStorage.getItem('tok') || '';
let ME = JSON.parse(sessionStorage.getItem('me') || 'null');
let D = { products: [], stock: {}, settings: {} };
let screen = 'work', pin = '', pickedUser = null;
let stockTab = 'raw', nomTab = 'raw', expanded = {}, wSel = null, wDone = null, pCnt = {}, pDate = null, busy = false;

const $ = s => document.querySelector(s);
const app = $('#app');
const fmt = n => (Math.round((+n || 0) * 100) / 100).toLocaleString('ru-RU');
const money = n => fmt(n) + ' ₸';
const today = () => new Date().toISOString().slice(0, 10);
const P = id => D.products.find(p => p.id === id) || { name: '?', unit: '', recipe: [] };
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const TYPE_NAMES = { raw: 'Продукты', semi: 'Полуфабрикаты', dish: 'Готовые блюда' };
const hasRecipe = p => p.recipe && p.recipe.length > 0;

function toast(msg, ms) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms || 2200);
}
async function api(path, method, body) {
  const r = await fetch('/api' + path, {
    method: method || 'GET',
    headers: { 'Content-Type': 'application/json', 'x-token': TOKEN },
    body: body ? JSON.stringify(body) : undefined
  });
  const j = await r.json();
  if (r.status === 401 && ME) { logout(); throw new Error('Сессия истекла — войдите заново'); }
  if (!r.ok) throw new Error(j.error || 'Ошибка');
  return j;
}
function logout() { TOKEN = ''; ME = null; sessionStorage.clear(); pickedUser = null; pin = ''; render(); }
async function reload() { D = await api('/bootstrap'); }

function tabs(current, list, fn) {
  return `<div class="tabbar">${list.map(t => `<button class="${current === t[0] ? 'on' : ''}" onclick="${fn}('${t[0]}')">${t[1]}</button>`).join('')}</div>`;
}
function opTime(o) { return new Date(o.ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }); }

// ===================== ВХОД =====================
async function renderLogin() {
  const users = await (await fetch('/api/users')).json();
  if (!pickedUser) {
    app.innerHTML = `<main style="padding-top:40px">
      <h1 style="text-align:center;font-size:22px;margin-bottom:4px">ТТ Алем</h1>
      <p style="text-align:center;color:var(--mut);font-size:14px;margin-bottom:24px">Кто вы?</p>
      ${users.map(u => `<button class="btn sec userbtn" style="margin-bottom:10px" onclick="pickUser('${u.id}')">${esc(u.name)} <span class="sub">· ${{cook:'повар',tech:'технолог',admin:'директор'}[u.role] || ''}</span></button>`).join('')}
    </main>`;
    return;
  }
  app.innerHTML = `<main style="padding-top:40px;text-align:center">
    <h1 style="font-size:20px">${esc(pickedUser.name)}</h1>
    <p style="color:var(--mut);font-size:14px;margin:6px 0 10px">Введите PIN</p>
    <div class="dots" id="dots"></div>
    <div class="pinpad">
      ${[1,2,3,4,5,6,7,8,9].map(n => `<button onclick="pinKey(${n})">${n}</button>`).join('')}
      <button onclick="pickedUser=null;pin='';render()" style="font-size:14px">Назад</button>
      <button onclick="pinKey(0)">0</button>
      <button onclick="pin=pin.slice(0,-1);drawDots()" style="font-size:16px">⌫</button>
    </div>
  </main>`;
  drawDots();
}
window.pickUser = function(id) {
  fetch('/api/users').then(r => r.json()).then(us => { pickedUser = us.find(u => u.id === id); pin = ''; render(); });
};
function drawDots() { $('#dots').textContent = '●'.repeat(pin.length); }
window.pinKey = async function(n) {
  pin += n; drawDots();
  if (pin.length === 4) {
    try {
      const r = await api('/login', 'POST', { userId: pickedUser.id, pin });
      TOKEN = r.token; ME = r.user;
      sessionStorage.setItem('tok', TOKEN); sessionStorage.setItem('me', JSON.stringify(ME));
      screen = ME.role === 'cook' ? 'work' : ME.role === 'tech' ? 'nom' : 'cost';
      await reload(); render();
    } catch (e) { toast(e.message); pin = ''; drawDots(); }
  }
};

// ===================== КАРКАС =====================
const NAVS = {
  cook: [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['stock','📋','Остатки']],
  tech: [['nom','📖','Номенклатура'],['work','⚖️','Обработка'],['loss','📉','Потери'],['stock','📋','Остатки']],
  admin: [['cost','💰','Калькуляция'],['output','📊','Выработка'],['rcpt','📦','Приход'],['stock','📋','Остатки'],['ops','🕓','Журнал'],['sync','🔄','1С']]
};
function shell(inner) {
  const navs = NAVS[ME.role] || NAVS.admin;
  app.innerHTML = `
  <header><h1>ТТ Алем</h1><span class="who">${esc(ME.name)} · <a href="#" onclick="logout();return false" style="color:var(--mut)">выйти</a></span></header>
  <main id="m">${inner}</main>
  <nav>${navs.map(n => `<button class="${screen === n[0] ? 'on' : ''}" onclick="go('${n[0]}')"><span class="ic">${n[1]}</span>${n[2]}</button>`).join('')}</nav>`;
}
window.go = async function(s) { screen = s; wSel = null; wDone = null; expanded = {}; await reload(); render(); };
window.logout = logout;

// ===================== ПОВАР: ОБРАБОТКА =====================
async function scrWork() {
  const semis = D.products.filter(p => p.type === 'semi' && p.sourceId);
  const myOps = await api('/ops?date=' + today() + '&type=processing&mine=1');
  const hist = myOps.length ? `<div class="hist-title">Вы сегодня обработали:</div>
    ${myOps.slice().reverse().map(o => `<div class="card" style="padding:10px 14px">
      <div style="display:flex;justify-content:space-between"><b style="font-size:14px">${esc(P(o.rawId).name)}</b><span class="sub">${opTime(o)}</span></div>
      <div class="sub">${fmt(o.qtyBefore)} → ${fmt(o.qtyAfter)} ${P(o.rawId).unit} · потери ${o.lossPct}%</div>
    </div>`).join('')}` : '';

  if (wDone) {
    const d = wDone; wDone = null;
    return `<div class="done"><div class="big-ico">✅</div>
      <b>Записано!</b><br>${esc(P(d.rawId).name)}: ${fmt(d.qtyBefore)} → ${fmt(d.qtyAfter)} ${P(d.rawId).unit}<br>
      <span class="sub">Потери ${d.lossPct}% · ${opTime(d)}</span></div>
    <button class="btn" onclick="render()">Обработать ещё</button>${hist}`;
  }
  if (!wSel) {
    return `<h2>Что вы обработали?</h2>
    ${semis.map(s => {
      const raw = P(s.sourceId);
      return `<div class="card" style="cursor:pointer" onclick="wPick('${s.id}')">
        <b>${esc(raw.name)}</b> → ${esc(s.name)}
      </div>`;
    }).join('') || '<p class="sub">Пока нет пар продукт → полуфабрикат. Их настраивает технолог.</p>'}${hist}`;
  }
  const s = P(wSel), raw = P(s.sourceId);
  return `<button class="btn sec small" onclick="wSel=null;render()">← Назад</button>
  <div class="card" style="margin-top:12px">
    <div class="pill ok">${esc(raw.name)} → ${esc(s.name)}</div>
    <label>Вес ДО обработки, ${raw.unit}</label>
    <input class="big" id="wb" type="number" step="0.01" inputmode="decimal" oninput="wCalc()">
    <label>Вес ПОСЛЕ обработки, ${raw.unit}</label>
    <input class="big" id="wa" type="number" step="0.01" inputmode="decimal" oninput="wCalc()">
    <div id="wloss" style="margin:14px 0;text-align:center;font-size:15px;color:var(--mut)">Введите оба веса</div>
    <button class="btn" id="wgo" disabled onclick="wSave()">Записать</button>
  </div>${hist}`;
}
window.wPick = function(id) { wSel = id; render(); };
window.wCalc = function() {
  const b = +$('#wb').value, a = +$('#wa').value, el = $('#wloss'), btn = $('#wgo');
  if (b > 0 && a > 0 && a <= b) {
    el.innerHTML = `Потери: <b>${((1 - a / b) * 100).toFixed(1)}%</b>`;
    btn.disabled = false;
  } else if (a > b) { el.textContent = 'Вес ПОСЛЕ больше веса ДО — проверьте'; btn.disabled = true; }
  else { el.textContent = 'Введите оба веса'; btn.disabled = true; }
};
window.wSave = async function() {
  if (busy) return;
  const s = P(wSel), b = +$('#wb').value, a = +$('#wa').value;
  // защита от повтора: тот же продукт за последние 10 минут
  try {
    busy = true; $('#wgo').disabled = true;
    const recent = await api('/ops?date=' + today() + '&type=processing&mine=1');
    const dup = recent.find(o => o.semiId === wSel && (Date.now() - new Date(o.ts)) < 10 * 60 * 1000);
    if (dup && !confirm('Вы уже записывали «' + P(dup.rawId).name + '» в ' + opTime(dup) + ' (' + dup.qtyBefore + ' → ' + dup.qtyAfter + ').\n\nЭто НОВАЯ партия?')) {
      busy = false; $('#wgo').disabled = false; return;
    }
    const r = await api('/ops', 'POST', { type: 'processing', rawId: s.sourceId, semiId: wSel, qtyBefore: b, qtyAfter: a });
    wDone = r; wSel = null;
    render();
  } catch (e) { toast(e.message); if ($('#wgo')) $('#wgo').disabled = false; }
  busy = false;
};

// ===================== ПОВАР: ВЫПУСК =====================
async function scrProd() {
  const producible = D.products.filter(p => hasRecipe(p));
  const date = pDate || today();
  const dayOps = await api('/ops?date=' + date + '&type=production');
  const anyCnt = Object.values(pCnt).some(v => v > 0);
  return `<h2>Выпуск готовой продукции</h2>
  <div class="card">
  ${producible.map(d => `<div class="list-item">
    <span class="nm">${esc(d.name)}${d.type === 'semi' ? ' <span class="sub">(полуфабрикат)</span>' : ''}</span>
    <span class="stepper">
      <button onclick="pStep('${d.id}',-1)">−</button>
      <span>${pCnt[d.id] || 0}</span>
      <button onclick="pStep('${d.id}',1)">+</button>
    </span>
  </div>`).join('')}
  </div>
  <button class="btn" ${anyCnt ? '' : 'disabled'} onclick="pSave()">Записать выпуск</button>
  <p class="sub" style="margin:8px 0 0;text-align:center">${anyCnt ? 'Продукты спишутся по рецептам' : 'Нажмите + напротив того, что приготовили'}</p>
  <div class="hist-title">Выпущено за <input type="date" value="${date}" onchange="pDate=this.value;render()" style="width:auto;padding:4px 8px;font-size:13px;display:inline-block">:</div>
  ${dayOps.length ? dayOps.slice().reverse().map(o => `<div class="card" style="padding:10px 14px">
    <div style="display:flex;justify-content:space-between"><b style="font-size:14px">${esc(P(o.productId).name)} × ${fmt(o.count)}</b><span class="sub">${opTime(o)}</span></div>
  </div>`).join('') : '<p class="sub">В этот день выпуска не было.</p>'}`;
}
window.pStep = function(id, d) { pCnt[id] = Math.max(0, (pCnt[id] || 0) + d); render(); };
window.pSave = async function() {
  if (busy) return;
  busy = true;
  try {
    const entries = Object.entries(pCnt).filter(([, c]) => c > 0);
    for (const [productId, count] of entries) {
      await api('/ops', 'POST', { type: 'production', productId, count });
    }
    toast('✅ Выпуск записан');
    pCnt = {};
    render();
  } catch (e) { toast(e.message); }
  busy = false;
};

// ===================== ОСТАТКИ (вкладки) =====================
function scrStock() {
  const showMoney = ME.role === 'admin';
  const list = D.products.filter(p => p.type === stockTab);
  let totalVal = 0;
  if (showMoney) D.products.forEach(p => { totalVal += (D.stock[p.id] || {}).value || 0; });
  return `${showMoney ? `<div class="card" style="display:flex;justify-content:space-between"><span>Стоимость всех остатков</span><b>${money(totalVal)}</b></div>` : ''}
  ${tabs(stockTab, [['raw','Продукты'],['semi','Полуфабрикаты'],['dish','Готовые блюда']], 'stockTabSet')}
  <div class="card">
    ${list.map(p => {
      const s = D.stock[p.id] || { qty: 0 };
      return `<div class="list-item"><span class="nm">${esc(p.name)}${showMoney ? `<div class="sub">${money(s.avg || 0)}/${p.unit}</div>` : ''}</span>
        <span class="vl ${s.qty < -0.001 ? 'neg' : ''}">${fmt(s.qty)} ${p.unit}</span></div>`;
    }).join('') || '<p class="sub">пусто</p>'}
  </div>
  ${ME.role === 'admin' ? `<button class="btn sec" onclick="go('inv')">Инвентаризация</button>` : ''}`;
}
window.stockTabSet = function(t) { stockTab = t; render(); };

function scrInv() {
  const items = D.products.filter(p => p.type !== 'dish');
  return `<h2>Инвентаризация: фактические остатки</h2>
  <div class="card">${items.map(p => {
    const s = D.stock[p.id] || { qty: 0 };
    return `<div class="list-item"><span class="nm">${esc(p.name)}<div class="sub">по учёту: ${fmt(s.qty)} ${p.unit}</div></span>
      <input data-inv="${p.id}" type="number" step="0.01" inputmode="decimal" placeholder="${fmt(s.qty)}" style="width:110px;text-align:center">
    </div>`;
  }).join('')}</div>
  <button class="btn" onclick="invSave()">Зафиксировать</button>
  <p class="sub" style="margin-top:8px;text-align:center">Пустое поле = без изменений.</p>`;
}
window.invSave = async function() {
  const items = [];
  document.querySelectorAll('[data-inv]').forEach(el => {
    if (el.value !== '') items.push({ productId: el.dataset.inv, factQty: +el.value });
  });
  if (!items.length) return toast('Ничего не введено');
  try {
    const r = await api('/ops', 'POST', { type: 'inventory', items });
    toast('Готово. Расхождение: ' + money(r.sum));
    screen = 'stock'; await reload(); render();
  } catch (e) { toast(e.message); }
};

// ===================== ТЕХНОЛОГ: НОМЕНКЛАТУРА =====================
function recipeRows(p, depth) {
  depth = depth || 0;
  if (!hasRecipe(p)) return '';
  return p.recipe.map(it => {
    const c = P(it.productId);
    const nested = hasRecipe(c);
    const open = expanded[p.id + '/' + it.productId];
    return `<div class="list-item" style="padding-left:${8 + depth * 16}px">
      <span class="nm" ${nested ? `style="cursor:pointer" onclick="expToggle('${p.id}/${it.productId}')"` : ''}>
        ${nested ? `<span class="rec-mark">${open ? '▾' : '▸'} </span>` : ''}${esc(c.name)}${nested ? ' <span class="pill ok" style="font-size:10px">рецепт</span>' : ''}
        ${it.noteRaw ? `<div class="sub">записи Альфии: сырое ${esc(it.noteRaw)} / готовое ${esc(it.noteDone)}</div>` : ''}
      </span>
      <span class="vl">${fmt(it.qty)} ${c.unit === 'кг' ? 'г' : 'шт'}</span>
    </div>${nested && open ? `<div class="recipe-box" style="margin-left:${8 + depth * 16}px">${recipeRows(c, depth + 1)}</div>` : ''}`;
  }).join('');
}
function scrNom() {
  const list = D.products.filter(p => p.type === nomTab);
  return `${tabs(nomTab, [['raw','Продукты'],['semi','Полуфабрикаты'],['dish','Готовые блюда']], 'nomTabSet')}
  ${list.map(p => {
    const open = expanded[p.id];
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="flex:1;${hasRecipe(p) ? 'cursor:pointer' : ''}" onclick="${hasRecipe(p) ? `expToggle('${p.id}')` : ''}">
          <b>${hasRecipe(p) ? (open ? '▾ ' : '▸ ') : ''}${esc(p.name)}</b>
          ${p.sourceId ? `<div class="sub">выработка из: ${esc(P(p.sourceId).name)}</div>` : ''}
          ${p.code1c ? `<div class="sub">код 1С: ${esc(p.code1c)}</div>` : ''}
        </span>
        <button class="btn sec small" onclick="gEdit('${p.id}')">✎ изменить</button>
      </div>
      ${open && hasRecipe(p) ? `<div class="recipe-box">${recipeRows(p)}</div>` : ''}
    </div>`;
  }).join('') || '<p class="sub">В этом разделе пусто.</p>'}
  <button class="btn" onclick="gEdit(null)">+ Добавить</button>`;
}
window.nomTabSet = function(t) { nomTab = t; render(); };
window.expToggle = function(k) { expanded[k] = !expanded[k]; render(); };

let editRecipe = [];
window.gEdit = function(id) {
  const p = id ? P(id) : { name: '', type: nomTab, unit: 'кг', sourceId: '', code1c: '', recipe: [] };
  editRecipe = JSON.parse(JSON.stringify(p.recipe || []));
  drawEdit(id, p);
};
function drawEdit(id, p) {
  const others = D.products.filter(x => x.id !== id);
  const raws = D.products.filter(x => x.type === 'raw' && x.id !== id);
  $('#m').innerHTML = `<button class="btn sec small" onclick="render()">← Назад</button>
  <div class="card" style="margin-top:12px">
    <label>Наименование</label><input id="gn" value="${esc(p.name)}">
    <label>Раздел</label><select id="gt">
      <option value="raw" ${p.type === 'raw' ? 'selected' : ''}>Продукт (покупной)</option>
      <option value="semi" ${p.type === 'semi' ? 'selected' : ''}>Полуфабрикат</option>
      <option value="dish" ${p.type === 'dish' ? 'selected' : ''}>Готовое блюдо</option>
    </select>
    <label>Единица</label><select id="gu"><option ${p.unit === 'кг' ? 'selected' : ''}>кг</option><option ${p.unit === 'шт' ? 'selected' : ''}>шт</option></select>
    <label>Выработка взвешиванием из (для полуфабрикатов типа «помидор очищенный»)</label>
    <select id="gs"><option value="">— не используется —</option>${raws.map(r => `<option value="${r.id}" ${p.sourceId === r.id ? 'selected' : ''}>${esc(r.name)}</option>`).join('')}</select>
    <label>Код в 1С</label><input id="gc" value="${esc(p.code1c || '')}">
  </div>
  <div class="card">
    <h2>Рецепт (состав)</h2>
    <p class="sub" style="margin-bottom:8px">Если добавить состав — позиция станет полуфабрикатом и будет считаться по рецепту.</p>
    <div id="recrows">${editRecipe.map((it, i) => {
      const c = P(it.productId);
      return `<div class="list-item">
        <span class="nm">${esc(c.name)}</span>
        <input type="number" step="0.1" inputmode="decimal" value="${it.qty}" data-rq="${i}" style="width:90px;text-align:center">
        <span class="sub" style="min-width:22px">${c.unit === 'кг' ? 'г' : 'шт'}</span>
        <button class="btn sec small" onclick="recDel(${i},'${id || ''}')">✕</button>
      </div>`;
    }).join('')}</div>
    <div class="row" style="margin-top:10px">
      <select id="recadd">${others.map(o => `<option value="${o.id}">${esc(o.name)}</option>`).join('')}</select>
      <button class="btn sec small" style="flex:0 0 auto" onclick="recAdd('${id || ''}')">+ добавить</button>
    </div>
  </div>
  <button class="btn" onclick="gSave('${id || ''}')">Сохранить</button>`;
}
function collectRecipeInputs() {
  document.querySelectorAll('[data-rq]').forEach(el => { editRecipe[+el.dataset.rq].qty = +el.value || 0; });
}
window.recAdd = function(id) {
  collectRecipeInputs();
  editRecipe.push({ productId: $('#recadd').value, qty: 0 });
  drawEdit(id || null, collectForm(id));
};
window.recDel = function(i, id) {
  collectRecipeInputs();
  editRecipe.splice(i, 1);
  drawEdit(id || null, collectForm(id));
};
function collectForm(id) {
  return { name: $('#gn').value, type: $('#gt').value, unit: $('#gu').value, sourceId: $('#gs').value, code1c: $('#gc').value, recipe: editRecipe };
}
window.gSave = async function(id) {
  collectRecipeInputs();
  const body = { name: $('#gn').value.trim(), type: $('#gt').value, unit: $('#gu').value,
    sourceId: $('#gs').value || null, code1c: $('#gc').value.trim(), recipe: editRecipe.filter(it => it.qty > 0) };
  if (!body.name) return toast('Введите наименование');
  try {
    const saved = id ? await api('/products/' + id, 'PUT', body) : await api('/products', 'POST', body);
    if (saved.type !== body.type && body.recipe.length) toast('Сохранено. Позиция перенесена в «' + TYPE_NAMES[saved.type] + '» — у неё есть рецепт');
    else toast('Сохранено');
    nomTab = saved.type;
    await reload(); render();
  } catch (e) { toast(e.message); }
};

// ===================== ДИРЕКТОР: КАЛЬКУЛЯЦИЯ =====================
let costData = null;
async function scrCost() {
  costData = await api('/report/costing');
  const dishes = costData.filter(c => c.type === 'dish');
  const semis = costData.filter(c => c.type !== 'dish');
  const block = arr => arr.map(d => {
    const open = expanded['c' + d.productId];
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="expToggle('c${d.productId}')">
        <b>${open ? '▾ ' : '▸ '}${esc(d.name)}</b><span style="font-size:19px;font-weight:700">${money(d.total)}<span class="sub">/${d.unit}</span></span>
      </div>
      ${open ? `<div class="recipe-box">${d.items.map(i => `<div class="list-item">
        <span class="nm">${esc(i.name)}${i.hasRecipe ? ' <span class="pill ok" style="font-size:10px">рецепт</span>' : ''}<div class="sub">${fmt(i.qty)} ${i.unit === 'кг' ? 'г' : 'шт'} × ${money(i.unitCost)}/${i.unit}</div></span>
        <span class="vl">${money(i.cost)}</span></div>`).join('')}</div>` : ''}
    </div>`;
  }).join('');
  return `<h2>Себестоимость сейчас</h2>
  <p class="sub" style="margin-bottom:12px">Считается из последних цен закупа и фактических потерь. Нажмите строку — раскроется состав.</p>
  ${dishes.length ? block(dishes) : ''}
  ${semis.length ? `<h2 style="margin-top:16px">Полуфабрикаты с рецептом</h2>${block(semis)}` : ''}`;
}

// ===================== ДИРЕКТОР: ВЫРАБОТКА ЗА ПЕРИОД =====================
let outFrom = null, outTo = null;
async function scrOutput() {
  const from = outFrom || today(), to = outTo || today();
  const r = await api('/report/output?from=' + from + '&to=' + to);
  const userStr = bu => Object.entries(bu).map(([n, v]) => `${esc(n)}: ${typeof v === 'object' ? fmt(v.before) + '→' + fmt(v.after) : fmt(v)}`).join(' · ');
  return `<h2>Выработка за период</h2>
  <div class="card"><div class="row">
    <div><label>С</label><input type="date" id="of" value="${from}" onchange="outFrom=this.value;render()"></div>
    <div><label>По</label><input type="date" id="ot" value="${to}" onchange="outTo=this.value;render()"></div>
  </div>
  <div class="row" style="margin-top:10px">
    <button class="btn sec small" onclick="outSet(0)">Сегодня</button>
    <button class="btn sec small" onclick="outSet(7)">Неделя</button>
    <button class="btn sec small" onclick="outSet(30)">Месяц</button>
  </div></div>
  <h2>Обработка продуктов</h2>
  ${r.processing.length ? r.processing.map(m => `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <b>${esc(m.raw)} → ${esc(m.semi)}</b>
      <span class="pill ${m.avgLossPct > 35 ? 'bad' : m.avgLossPct > 20 ? 'warn' : 'ok'}">потери ${m.avgLossPct}%</span>
    </div>
    <div class="sub" style="margin-top:4px">${fmt(m.totalBefore)} → ${fmt(m.totalAfter)} ${m.unit} · операций: ${m.operations}</div>
    <div class="sub">${userStr(m.byUser)}</div>
  </div>`).join('') : '<p class="sub">Обработки за период не было.</p>'}
  <h2 style="margin-top:16px">Выпуск продукции</h2>
  ${r.production.length ? r.production.map(m => `<div class="card">
    <div style="display:flex;justify-content:space-between"><b>${esc(m.name)}</b><span class="vl">${fmt(m.count)} ${m.unit}</span></div>
    <div class="sub">на сумму ${money(m.sum)} · ${userStr(m.byUser)}</div>
  </div>`).join('') : '<p class="sub">Выпуска за период не было.</p>'}`;
}
window.outSet = function(days) {
  const d = new Date(); outTo = d.toISOString().slice(0, 10);
  d.setDate(d.getDate() - days); outFrom = d.toISOString().slice(0, 10);
  render();
};

// ===================== ДИРЕКТОР: ПРИХОД =====================
async function scrRcpt() {
  const raws = D.products.filter(p => p.type === 'raw');
  const dayOps = await api('/ops?date=' + today() + '&type=receipt');
  return `<h2>Приход продуктов</h2>
  <div class="card">
    <label>Продукт</label>
    <select id="rp">${raws.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select>
    <div class="row">
      <div><label>Количество</label><input class="big" id="rq" type="number" step="0.01" inputmode="decimal"></div>
      <div><label>Цена за ед., ₸</label><input class="big" id="rc" type="number" step="0.01" inputmode="decimal"></div>
    </div>
    <div style="height:14px"></div>
    <button class="btn" onclick="rSave()">Оприходовать</button>
    <p class="sub" style="margin-top:10px">Временный ручной ввод. После подключения 1С приходы будут загружаться из Поступлений ТМЗ автоматически.</p>
  </div>
  <div class="hist-title">Приходы сегодня:</div>
  ${dayOps.length ? dayOps.slice().reverse().map(o => `<div class="card" style="padding:10px 14px">
    <div style="display:flex;justify-content:space-between"><b style="font-size:14px">${esc(P(o.productId).name)}</b><span class="sub">${opTime(o)}</span></div>
    <div class="sub">${fmt(o.qty)} × ${money(o.price)} = ${money(o.sum)}</div>
  </div>`).join('') : '<p class="sub">Сегодня приходов не было.</p>'}`;
}
window.rSave = async function() {
  const q = +$('#rq').value, c = +$('#rc').value;
  if (!(q > 0) || !(c > 0)) return toast('Заполните количество и цену');
  try {
    await api('/ops', 'POST', { type: 'receipt', productId: $('#rp').value, qty: q, price: c });
    toast('✅ Приход записан'); await reload(); render();
  } catch (e) { toast(e.message); }
};

// ===================== ДИРЕКТОР: ЖУРНАЛ =====================
let opsDate = null;
async function scrOps() {
  const date = opsDate || today();
  const ops = await api('/ops?date=' + date);
  const label = { receipt: '📦 Приход', processing: '⚖️ Обработка', production: '🥪 Выпуск', inventory: '📋 Инвентаризация' };
  return `<h2>Журнал операций</h2>
  <div class="card"><label>Дата</label><input type="date" value="${date}" onchange="opsDate=this.value;render()"></div>
  ${ops.length ? ops.slice().reverse().map(o => {
    let desc = '';
    if (o.type === 'receipt') desc = `${esc(P(o.productId).name)}: ${fmt(o.qty)} × ${money(o.price)}`;
    if (o.type === 'processing') desc = `${esc(P(o.rawId).name)} ${fmt(o.qtyBefore)} → ${esc(P(o.semiId).name)} ${fmt(o.qtyAfter)} (потери ${o.lossPct}%)`;
    if (o.type === 'production') desc = `${esc(P(o.productId).name)} × ${fmt(o.count)}`;
    if (o.type === 'inventory') desc = `позиций: ${o.items.length}`;
    return `<div class="card"><div style="display:flex;justify-content:space-between">
      <b>${label[o.type] || o.type}</b><span class="sub">${opTime(o)}</span></div>
      <div style="margin:6px 0">${desc}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="sub">${money(o.sum)}</span>
        <button class="btn sec small" onclick="opDel('${o.id}')">Отменить</button>
      </div></div>`;
  }).join('') : '<p class="sub">Операций в этот день не было.</p>'}`;
}
window.opDel = async function(id) {
  if (!confirm('Отменить операцию? Остатки вернутся как было.')) return;
  try { await api('/ops/' + id, 'DELETE'); toast('Отменено'); await reload(); render(); } catch (e) { toast(e.message); }
};

// ===================== ДИРЕКТОР: 1С =====================
let syncDate = null;
async function scrSync() {
  const d = syncDate || today();
  const r = await api('/1c/export?date=' + d);
  const S = D.settings;
  return `<h2>Обмен с 1С</h2>
  <div class="card">
    <h2>Склады в 1С</h2>
    <label>Основной склад (закуп)</label><input id="s1" value="${esc(S.skladMain)}">
    <label>Склад кухни (производство)</label><input id="s2" value="${esc(S.skladKitchen)}">
    <label>Склад готовой продукции</label><input id="s3" value="${esc(S.skladDone)}">
    <div style="height:10px"></div>
    <button class="btn sec" onclick="sklSave()">Сохранить склады</button>
    <p class="sub" style="margin-top:8px">Названия должны совпадать со справочником «Склады» в 1С слово в слово.</p>
  </div>
  <div class="card">
    <label>Дата выгрузки</label>
    <input type="date" value="${d}" onchange="syncDate=this.value;render()">
    <div style="height:10px"></div>
    <p style="font-size:14px">Документов: <b>${r.Документы.length}</b></p>
    ${r.Документы.map(doc => `<div class="list-item"><span class="nm">${esc(doc.Комментарий)}
      <div class="sub">${doc.ВидДокумента}${doc.Время ? ' · ' + doc.Время : ''}${doc.Склад ? ' · ' + esc(doc.Склад) : ''}${doc.СкладОтправитель ? ' · ' + esc(doc.СкладОтправитель) + ' → ' + esc(doc.СкладПолучатель) : ''}</div>
    </span></div>`).join('') || '<p class="sub">За эту дату операций нет.</p>'}
    <div style="height:10px"></div>
    <button class="btn sec" onclick="syncCopy()">Скопировать JSON для 1С</button>
  </div>`;
}
window.sklSave = async function() {
  try {
    await api('/settings', 'PUT', { skladMain: $('#s1').value.trim(), skladKitchen: $('#s2').value.trim(), skladDone: $('#s3').value.trim() });
    toast('Склады сохранены'); await reload(); render();
  } catch (e) { toast(e.message); }
};
window.syncCopy = async function() {
  const r = await api('/1c/export?date=' + (syncDate || today()));
  await navigator.clipboard.writeText(JSON.stringify(r, null, 1));
  toast('JSON скопирован');
};

// ===================== ТЕХНОЛОГ: ПОТЕРИ =====================
async function scrLoss() {
  const rows = await api('/report/losses');
  if (!rows.length) return '<h2>Потери при обработке</h2><p class="sub">Пока нет данных — повара ещё не вносили обработку.</p>';
  return `<h2>Потери при обработке</h2><div class="card">
    ${rows.map(r => `<div class="list-item">
      <span class="nm">${esc(r.product)}<div class="sub">${esc(r.user)} · операций: ${r.operations} · ${fmt(r.totalBefore)} → ${fmt(r.totalAfter)}</div></span>
      <span class="pill ${r.avgLossPct > 35 ? 'bad' : r.avgLossPct > 20 ? 'warn' : 'ok'}">${r.avgLossPct}%</span>
    </div>`).join('')}
  </div>`;
}

// ===================== РОУТЕР =====================
const SCREENS = { work: scrWork, prod: scrProd, stock: scrStock, inv: scrInv, cost: scrCost, output: scrOutput, rcpt: scrRcpt, ops: scrOps, sync: scrSync, nom: scrNom, loss: scrLoss };
async function render() {
  if (!ME) return renderLogin();
  const fn = SCREENS[screen] || scrStock;
  const out = fn();
  shell(out instanceof Promise ? '<p class="sub">Загрузка…</p>' : out);
  if (out instanceof Promise) {
    try { $('#m').innerHTML = await out; } catch (e) { $('#m').innerHTML = `<p class="sub">${esc(e.message)}</p>`; }
  }
}
(async () => {
  if (ME) { try { await reload(); } catch (e) { logout(); return; } }
  render();
})();
</script>
</body>
</html>
