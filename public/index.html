<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ТТ Алем</title>
<style>
:root{--bg:#f6f5f2;--card:#fff;--ink:#1c1c1a;--mut:#8a8880;--line:#e4e2db;--acc:#1d6e56;--accbg:#e2f3ec;--red:#b3362e;--redbg:#fbeceb;--amb:#9a6b10;--ambbg:#faf0da;--blu:#1d4f8f;--blubg:#e5eefb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;padding-bottom:76px}
header{position:sticky;top:0;background:var(--bg);padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;z-index:5;border-bottom:1px solid var(--line)}
header h1{font-size:17px;font-weight:600}
header .who{font-size:13px;color:var(--mut)}
main{padding:14px 14px 20px;max-width:640px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s}
.card.static{cursor:default}
.card:active{box-shadow:0 0 0 2px var(--line)}
.card-body{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;cursor:default}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-size:17px;font-weight:600;cursor:pointer}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.green{background:var(--acc)}
.btn.red{background:var(--red)}
.btn:disabled{opacity:.35}
input,select{width:100%;padding:13px;border:1px solid var(--line);border-radius:10px;font-size:17px;background:var(--card);color:var(--ink)}
input.big{font-size:26px;font-weight:600;text-align:center}
label{display:block;font-size:13px;color:var(--mut);margin:12px 0 5px}
.row{display:flex;gap:10px}.row>*{flex:1}
.pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600}
.ok{background:var(--accbg);color:var(--acc)}.bad{background:var(--redbg);color:var(--red)}.warn{background:var(--ambbg);color:var(--amb)}.info{background:var(--blubg);color:var(--blu)}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:5}
nav button{flex:1;padding:10px 2px 12px;border:none;background:none;font-size:11px;color:var(--mut);cursor:pointer}
nav button.on{color:var(--ink);font-weight:600}
nav button .ic{font-size:20px;display:block;margin-bottom:2px}
.li{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);gap:8px}
.li:last-child{border:none}
.li .nm{flex:1;font-size:15px}
.li .vl{font-weight:600;font-size:15px;white-space:nowrap}
.sub{font-size:12px;color:var(--mut)}
h2{font-size:15px;font-weight:600;margin:4px 0 10px}
.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:42px;height:42px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:22px;cursor:pointer}
.stepper span{min-width:44px;text-align:center;font-size:20px;font-weight:600}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:99px;font-size:14px;z-index:99;opacity:0;transition:.25s;max-width:90%;text-align:center}
.toast.show{opacity:1}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:16px auto}
.pinpad button{padding:18px;font-size:22px;border:1px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer}
.dots{text-align:center;font-size:28px;letter-spacing:10px;min-height:38px}
.userbtn{padding:16px;font-size:17px;text-align:left;cursor:pointer}
.tabbar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tabbar button{padding:10px 16px;border-radius:99px;border:1px solid var(--line);background:var(--card);font-size:14px;white-space:nowrap;cursor:pointer}
.tabbar button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.small{font-size:13px;padding:9px 12px;width:auto;display:inline-block}
.neg{color:var(--red)}
.done{background:var(--accbg);border:1px solid #bfe3d4;border-radius:14px;padding:16px;margin-bottom:12px;text-align:center}
.rec-inner{background:var(--bg);border-radius:10px;padding:8px 12px;margin:6px 0}
.chev{font-size:13px;color:var(--mut);transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(90deg)}
.hist-label{font-size:13px;color:var(--mut);margin:16px 0 6px;font-weight:600}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
let TOKEN = sessionStorage.getItem('tok') || '';
let ME = JSON.parse(sessionStorage.getItem('me') || 'null');
let D = { products: [], stock: {}, settings: {} };
let screen = 'work', pin = '', pickedUser = null;
let stockTab = 'raw', nomTab = 'raw', recFilter = 'all';
let exp = {}, wSel = null, wDone = null, pCnt = {}, pDate = null, busy = false;
let outFrom = null, outTo = null, syncDate = null, rcptOpen = false;

const $ = s => document.querySelector(s);
const app = $('#app');
const fmt = n => (Math.round((+n||0)*100)/100).toLocaleString('ru-RU');
const money = n => fmt(n) + ' ₸';
const today = () => new Date().toISOString().slice(0,10);
const P = id => D.products.find(p => p.id === id) || {name:'?',unit:'',recipe:[]};
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ROLE = {cook:'повар',tech:'менеджер',admin:'директор'};
const hasRecipe = p => p && p.recipe && p.recipe.length > 0;

// категории — 5 штук
const CATS = [
  {id:'raw',   icon:'🛒', name:'Продукты',          desc:'покупные ингредиенты'},
  {id:'process',icon:'⚖️',name:'Выработка',         desc:'чистка, варка, нарезка'},
  {id:'semi',  icon:'🧊', name:'Полуфабрикаты',     desc:'заготовки, заморозка'},
  {id:'bread', icon:'🍞', name:'Хлеб и тесто',      desc:'собственная выпечка'},
  {id:'dish',  icon:'🥪', name:'Готовые блюда',     desc:'продукция на борт'},
];
const CAT = id => CATS.find(c => c.id === id) || {icon:'📦',name:id};

const ST = {
  draft:     '<span class="pill warn">✏️ черновик</span>',
  submitted: '<span class="pill info">📨 у менеджера</span>',
  approved:  '<span class="pill ok">✅ утверждена</span>',
};

function toast(msg, ms) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms||2400);
}
async function api(path, method, body) {
  const r = await fetch('/api'+path, {
    method: method||'GET',
    headers:{'Content-Type':'application/json','x-token':TOKEN},
    body: body ? JSON.stringify(body) : undefined
  });
  const j = await r.json();
  if (r.status===401 && ME) { logout(); throw new Error('Сессия истекла'); }
  if (!r.ok) throw new Error(j.error||'Ошибка');
  return j;
}
function logout(){ TOKEN=''; ME=null; sessionStorage.clear(); pickedUser=null; pin=''; render(); }
async function reload(){ D = await api('/bootstrap'); }
function opTime(o){ return new Date(o.ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }

// ====== ВХОД ======
async function renderLogin(){
  const users = await (await fetch('/api/users')).json();
  if(!pickedUser){
    app.innerHTML=`<main style="padding-top:40px">
      <h1 style="text-align:center;font-size:22px;margin-bottom:4px">ТТ Алем</h1>
      <p style="text-align:center;color:var(--mut);font-size:14px;margin-bottom:24px">Кто вы?</p>
      ${users.map(u=>`<button class="btn sec userbtn" style="margin-bottom:10px" onclick="pickUser('${u.id}')">${esc(u.name)} <span class="sub">· ${ROLE[u.role]||''}</span></button>`).join('')}
    </main>`;
    return;
  }
  app.innerHTML=`<main style="padding-top:40px;text-align:center">
    <h1 style="font-size:20px">${esc(pickedUser.name)}</h1>
    <p style="color:var(--mut);font-size:14px;margin:6px 0 10px">Введите PIN</p>
    <div class="dots" id="dots"></div>
    <div class="pinpad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinKey(${n})">${n}</button>`).join('')}
      <button onclick="pickedUser=null;pin='';render()" style="font-size:14px">Назад</button>
      <button onclick="pinKey(0)">0</button>
      <button onclick="pin=pin.slice(0,-1);drawDots()" style="font-size:16px">⌫</button>
    </div>
  </main>`;
  drawDots();
}
window.pickUser = id => fetch('/api/users').then(r=>r.json()).then(us=>{pickedUser=us.find(u=>u.id===id);pin='';render();});
function drawDots(){ const d=$('#dots'); if(d) d.textContent='●'.repeat(pin.length); }
window.pinKey = async n => {
  pin+=n; drawDots();
  if(pin.length===4){
    try{
      const r = await api('/login','POST',{userId:pickedUser.id,pin});
      TOKEN=r.token; ME=r.user;
      sessionStorage.setItem('tok',TOKEN); sessionStorage.setItem('me',JSON.stringify(ME));
      screen = ME.role==='cook'?'work': ME.role==='tech'?'rec':'cost';
      await reload(); render();
    } catch(e){ toast(e.message); pin=''; drawDots(); }
  }
};

// ====== КАРКАС ======
const NAVS = {
  cook:  [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['rec','📖','Рецептуры'],['stock','📋','Остатки']],
  tech:  [['nom','🏷️','Продукты'],['rec','📖','Рецептуры'],['wo','🧂','Специи'],['output','📊','Выработка'],['stock','📋','Остатки']],
  admin: [['cost','💰','Калькуляция'],['output','📊','Выработка'],['stock','📋','Остатки'],['sync','🔄','1С']],
};
function shell(inner){
  const navs = NAVS[ME.role]||NAVS.admin;
  app.innerHTML=`
  <header><h1>ТТ Алем</h1><span class="who">${esc(ME.name)} · ${ROLE[ME.role]} · <a href="#" onclick="logout();return false" style="color:var(--mut)">выйти</a></span></header>
  <main id="m">${inner}</main>
  <nav>${navs.map(n=>`<button class="${screen===n[0]?'on':''}" onclick="go('${n[0]}')"><span class="ic">${n[1]}</span>${n[2]}</button>`).join('')}</nav>`;
}
window.go = async s => { screen=s; wSel=null; wDone=null; exp={}; await reload(); render(); };
window.logout = logout;

// ====== УТИЛИТА: карточка со свернуть/развернуть ======
function expandCard(key, header, body, extraClass){
  const open = exp[key];
  return `<div class="${extraClass||'card'}" onclick="toggle('${key}')">
    <div style="display:flex;justify-content:space-between;align-items:center">
      ${header}
      <span class="chev ${open?'open':''}">▶</span>
    </div>
    ${open ? `<div class="card-body" onclick="event.stopPropagation()">${body}</div>` : ''}
  </div>`;
}
window.toggle = key => { exp[key]=!exp[key]; renderInPlace(); };

// лёгкий перерендер без reload
function renderInPlace(){
  const fn = SCREENS[screen];
  if(!fn) return;
  const out = fn();
  if(out instanceof Promise) out.then(h=>{ if($('#m')) $('#m').innerHTML=h; }).catch(e=>{ if($('#m')) $('#m').innerHTML=`<p class="sub">${esc(e.message)}</p>`; });
  else if($('#m')) $('#m').innerHTML = out;
}

// ====== ПОВАР: ОБРАБОТКА ======
async function scrWork(){
  const semis = D.products.filter(p => p.type==='process' && p.sourceId);
  const myOps = await api('/ops?date='+today()+'&type=processing&mine=1');
  const hist = myOps.length ? `<div class="hist-label">Вы сегодня обработали:</div>
    ${myOps.slice().reverse().map(o=>expandCard('hw'+o.id,
      `<span><b>${esc(P(o.rawId).name)}</b> <span class="sub">${opTime(o)}</span></span>`,
      `${fmt(o.qtyBefore)} → ${fmt(o.qtyAfter)} ${P(o.rawId).unit} · потери ${o.lossPct}%`
    )).join('')}` : '';
  if(wDone){
    const d=wDone; wDone=null;
    return `<div class="done"><div style="font-size:34px">✅</div>
      <b>Записано!</b><br>${esc(P(d.rawId).name)}: ${fmt(d.qtyBefore)} → ${fmt(d.qtyAfter)} ${P(d.rawId).unit}<br>
      <span class="sub">Потери ${d.lossPct}% · ${opTime(d)}</span></div>
    <button class="btn" onclick="render()">Обработать ещё</button>${hist}`;
  }
  if(!wSel){
    return `<h2>Что вы обработали?</h2>
    ${semis.map(s=>{
      const raw=P(s.sourceId);
      return `<div class="card" onclick="wPick('${s.id}')"><b>${esc(raw.name)}</b> → ${esc(s.name)}</div>`;
    }).join('')||'<p class="sub">Нет пар продукт → выработка. Добавьте в разделе «Продукты».</p>'}${hist}`;
  }
  const s=P(wSel), raw=P(s.sourceId);
  return `<button class="btn sec small" onclick="wSel=null;render()">← Назад</button>
  <div class="card static" style="margin-top:12px">
    <span class="pill ok">${esc(raw.name)} → ${esc(s.name)}</span>
    <label>Вес ДО обработки, ${raw.unit}</label>
    <input class="big" id="wb" type="number" step="0.01" inputmode="decimal" oninput="wCalc()">
    <label>Вес ПОСЛЕ обработки, ${raw.unit}</label>
    <input class="big" id="wa" type="number" step="0.01" inputmode="decimal" oninput="wCalc()">
    <div id="wloss" style="margin:14px 0;text-align:center;font-size:15px;color:var(--mut)">Введите оба веса</div>
    <button class="btn" id="wgo" disabled onclick="wSave()">Записать</button>
  </div>${hist}`;
}
window.wPick = id => { wSel=id; render(); };
window.wCalc = () => {
  const b=+$('#wb').value, a=+$('#wa').value, el=$('#wloss'), btn=$('#wgo');
  if(b>0&&a>0&&a<=b){ el.innerHTML=`Потери: <b>${((1-a/b)*100).toFixed(1)}%</b>`; btn.disabled=false; }
  else if(a>b){ el.textContent='Вес ПОСЛЕ больше ДО — проверьте'; btn.disabled=true; }
  else { el.textContent='Введите оба веса'; btn.disabled=true; }
};
window.wSave = async () => {
  if(busy) return;
  const s=P(wSel), b=+$('#wb').value, a=+$('#wa').value;
  try{
    busy=true; $('#wgo').disabled=true;
    const recent = await api('/ops?date='+today()+'&type=processing&mine=1');
    const dup = recent.find(o=>o.semiId===wSel && (Date.now()-new Date(o.ts))<10*60*1000);
    if(dup && !confirm('Вы уже записывали «'+P(dup.rawId).name+'» в '+opTime(dup)+' ('+dup.qtyBefore+'→'+dup.qtyAfter+').\n\nЭто НОВАЯ партия?')){
      busy=false; if($('#wgo')) $('#wgo').disabled=false; return;
    }
    const r = await api('/ops','POST',{type:'processing',rawId:s.sourceId,semiId:wSel,qtyBefore:b,qtyAfter:a});
    wDone=r; wSel=null; render();
  } catch(e){ toast(e.message); if($('#wgo')) $('#wgo').disabled=false; }
  busy=false;
};

// ====== ПОВАР: ВЫПУСК ======
async function scrProd(){
  const approved = D.products.filter(p=>hasRecipe(p) && p.recipeStatus==='approved');
  const date = pDate||today();
  const dayOps = await api('/ops?date='+date+'&type=production');
  const anyCnt = Object.values(pCnt).some(v=>v>0);
  return `<h2>Выпуск готовой продукции</h2>
  ${approved.length ? `<div class="card static">
  ${approved.map(d=>`<div class="li">
    <span class="nm">${CAT(d.type).icon} ${esc(d.name)}</span>
    <span class="stepper">
      <button onclick="pStep('${d.id}',-1)">−</button>
      <span>${pCnt[d.id]||0}</span>
      <button onclick="pStep('${d.id}',1)">+</button>
    </span>
  </div>`).join('')}
  </div>
  <button class="btn" ${anyCnt?'':'disabled'} onclick="pSave()">Записать выпуск</button>
  <p class="sub" style="margin:8px 0 0;text-align:center">${anyCnt?'Продукты спишутся по рецептурам':'Нажмите + напротив того, что приготовили'}</p>`
  : '<div class="card static"><p class="sub">Нет утверждённых рецептур. Проверьте раздел «Рецептуры».</p></div>'}
  <div class="hist-label">Выпущено за <input type="date" value="${date}" onchange="pDate=this.value;render()" style="width:auto;padding:4px 8px;font-size:13px;display:inline-block">:</div>
  ${dayOps.length ? dayOps.slice().reverse().map(o=>expandCard('ph'+o.id,
    `<span><b>${CAT(P(o.productId).type).icon} ${esc(P(o.productId).name)} × ${fmt(o.count)}</b> <span class="sub">${opTime(o)}</span></span>`,
    P(o.productId).recipe.map(it=>`<div class="sub">${esc(P(it.productId).name)}: ${fmt(it.qty)} ${P(it.productId).unit==='кг'?'г':'шт'}</div>`).join('')
  )).join('') : '<p class="sub">В этот день выпуска не было.</p>'}`;
}
window.pStep = (id,d) => { pCnt[id]=Math.max(0,(pCnt[id]||0)+d); renderInPlace(); };
window.pSave = async () => {
  if(busy) return; busy=true;
  try{
    for(const [productId,count] of Object.entries(pCnt).filter(([,c])=>c>0))
      await api('/ops','POST',{type:'production',productId,count});
    toast('✅ Выпуск записан'); pCnt={}; render();
  } catch(e){ toast(e.message); }
  busy=false;
};

// ====== РЕЦЕПТУРЫ ======
function recRows(p, depth){
  depth=depth||0;
  return (p.recipe||[]).map(it=>{
    const c=P(it.productId), nested=hasRecipe(c), key='ri'+p.id+it.productId;
    return `<div class="li" style="padding-left:${depth*16}px" ${nested?`onclick="toggle('${key}');event.stopPropagation()"`:''}>
      <span class="nm">${nested?`<span class="chev ${exp[key]?'open':''}">▶</span> `:''}${esc(c.name)}${nested?' <span class="pill ok" style="font-size:10px">рецепт</span>':''}
      ${it.noteRaw?`<div class="sub">Excel: ${esc(it.noteRaw)} / ${esc(it.noteDone)}</div>`:''}
      </span><span class="vl">${fmt(it.qty)} ${c.unit==='кг'?'г':'шт'}</span></div>
    ${nested&&exp[key]?`<div class="rec-inner" style="margin-left:${depth*16}px">${recRows(c,depth+1)}</div>`:''}`;
  }).join('');
}
function canEdit(p){
  const st=p.recipeStatus||'draft';
  if(ME.role==='admin') return true;
  if(st==='approved') return false;
  if(st==='submitted') return ME.role==='tech';
  return true;
}
function scrRec(){
  const all = D.products.filter(p=>hasRecipe(p));
  const counts = {draft:0,submitted:0,approved:0};
  all.forEach(p=>counts[p.recipeStatus||'draft']++);
  const list = recFilter==='all' ? all : all.filter(p=>(p.recipeStatus||'draft')===recFilter);
  const grouped = {};
  list.forEach(p=>{ const t=p.type; if(!grouped[t]) grouped[t]=[]; grouped[t].push(p); });

  return `<div class="tabbar">
    ${[['all','Все ('+all.length+')'],['draft','✏️ ('+counts.draft+')'],['submitted','📨 ('+counts.submitted+')'],['approved','✅ ('+counts.approved+')']].map(t=>`<button class="${recFilter===t[0]?'on':''}" onclick="recFilter='${t[0]}';renderInPlace()">${t[1]}</button>`).join('')}
  </div>
  ${CATS.filter(cat=>grouped[cat.id]&&grouped[cat.id].length).map(cat=>`
    <div class="hist-label">${cat.icon} ${cat.name}</div>
    ${grouped[cat.id].map(p=>{
      const st=p.recipeStatus||'draft', open=exp['r'+p.id];
      return expandCard('r'+p.id,
        `<span style="flex:1"><b>${esc(p.name)}</b> ${ST[st]} ${!canEdit(p)?'🔒':''}</span>
         ${canEdit(p)?`<button class="btn sec small" onclick="event.stopPropagation();recEdit('${p.id}')">✎</button>`:''}`,
        `<div class="rec-inner">${recRows(p)}</div>
         ${st==='draft'&&ME.role==='cook'?`<button class="btn green" style="margin-top:8px" onclick="event.stopPropagation();recStatus('${p.id}','submit','Передать менеджеру? После этого вы не сможете её менять.')">Передать менеджеру →</button>`:''}
         ${st!=='approved'&&ME.role==='tech'?`<button class="btn green" style="margin-top:8px" onclick="event.stopPropagation();recStatus('${p.id}','approve','Утвердить? После этого изменить сможет только директор.')">✅ Утвердить</button>`:''}`,
        'card'
      );
    }).join('')}`).join('')||'<p class="sub">Пусто в этом разделе.</p>'}
  <button class="btn" onclick="recEdit(null)">+ Новая рецептура</button>`;
}
window.recStatus = async (id,action,msg) => {
  if(!confirm(msg)) return;
  try{ await api('/recipes/'+id+'/status','POST',{action}); toast('Готово'); await reload(); render(); }
  catch(e){ toast(e.message); }
};

let editRecipe=[];
window.recEdit = id => {
  const p = id ? P(id) : {name:'',type:'dish',unit:'шт',recipe:[]};
  editRecipe = JSON.parse(JSON.stringify(p.recipe||[]));
  drawRecEdit(id, p);
};
function drawRecEdit(id, p){
  const others = D.products.filter(x=>x.id!==id);
  $('#m').innerHTML=`<button class="btn sec small" onclick="render()">← Назад</button>
  <div class="card static" style="margin-top:12px">
    <label>Наименование</label><input id="gn" value="${esc(p.name)}">
    <div class="row">
      <div><label>Категория</label><select id="gt">
        ${CATS.filter(c=>c.id!=='raw').map(c=>`<option value="${c.id}" ${p.type===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('')}
      </select></div>
      <div><label>Единица</label><select id="gu"><option ${p.unit==='шт'?'selected':''}>шт</option><option ${p.unit==='кг'?'selected':''}>кг</option></select></div>
    </div>
  </div>
  <div class="card static">
    <h2>Состав</h2>
    <div id="recrows">${editRecipe.map((it,i)=>{
      const c=P(it.productId);
      return `<div class="li">
        <span class="nm">${esc(c.name)}</span>
        <input type="number" step="0.1" inputmode="decimal" value="${it.qty}" data-rq="${i}" style="width:90px;text-align:center">
        <span class="sub" style="min-width:22px">${c.unit==='кг'?'г':'шт'}</span>
        <button class="btn sec small" onclick="recDelRow(${i},'${id||''}')">✕</button>
      </div>`;
    }).join('')}</div>
    <div class="row" style="margin-top:10px">
      <select id="recadd">${others.map(o=>`<option value="${o.id}">${CAT(o.type).icon} ${esc(o.name)}</option>`).join('')}</select>
      <button class="btn sec small" style="flex:0 0 auto" onclick="recAddRow('${id||''}')">+ добавить</button>
    </div>
  </div>
  <button class="btn" onclick="recSave('${id||''}')">Сохранить черновик</button>
  <p class="sub" style="margin-top:8px;text-align:center">Сохранённая рецептура — черновик. Передайте менеджеру когда будет готово.</p>`;
}
function collectRec(){ document.querySelectorAll('[data-rq]').forEach(el=>{ editRecipe[+el.dataset.rq].qty=+el.value||0; }); }
function collectForm(){ return {name:$('#gn').value, type:$('#gt').value, unit:$('#gu').value, recipe:editRecipe}; }
window.recAddRow = id => { collectRec(); editRecipe.push({productId:$('#recadd').value,qty:0}); drawRecEdit(id||null,collectForm()); };
window.recDelRow = (i,id) => { collectRec(); editRecipe.splice(i,1); drawRecEdit(id||null,collectForm()); };
window.recSave = async id => {
  collectRec();
  const body={name:$('#gn').value.trim(), type:$('#gt').value, unit:$('#gu').value, recipe:editRecipe.filter(it=>it.qty>0)};
  if(!body.name) return toast('Введите наименование');
  if(!body.recipe.length) return toast('Добавьте хотя бы один ингредиент');
  try{
    if(id) await api('/products/'+id,'PUT',body); else await api('/products','POST',body);
    toast('Сохранено (черновик)'); await reload(); render();
  } catch(e){ toast(e.message); }
};

// ====== МЕНЕДЖЕР: ПРОДУКТЫ (НОМЕНКЛАТУРА) ======
function scrNom(){
  const list = D.products.filter(p=>p.type===nomTab);
  return `<div class="tabbar">${CATS.map(c=>`<button class="${nomTab===c.id?'on':''}" onclick="nomTab='${c.id}';renderInPlace()">${c.icon} ${c.name}</button>`).join('')}</div>
  ${list.map(p=>expandCard('n'+p.id,
    `<span style="flex:1"><b>${esc(p.name)}</b>${p.code1c?` <span class="sub">1С: ${esc(p.code1c)}</span>`:''}${p.sourceId?` <span class="sub">из: ${esc(P(p.sourceId).name)}</span>`:''}</span>
     <button class="btn sec small" onclick="event.stopPropagation();nomEdit('${p.id}')">✎</button>`,
    hasRecipe(p)?`<div class="rec-inner">${recRows(p)}</div>`:'<p class="sub">рецепта нет</p>'
  )).join('')||'<p class="sub">В этой категории пусто.</p>'}
  <button class="btn" onclick="nomEdit(null)">+ Добавить позицию</button>`;
}
window.nomEdit = id => {
  const p = id ? P(id) : {name:'',type:nomTab,unit:'кг',sourceId:'',code1c:''};
  const procs = D.products.filter(x=>x.type==='raw'&&x.id!==id);
  const locked = id && hasRecipe(p) && (p.recipeStatus==='approved') && ME.role!=='admin';
  $('#m').innerHTML=`<button class="btn sec small" onclick="render()">← Назад</button>
  <div class="card static" style="margin-top:12px">
    ${locked?'<p class="pill ok" style="margin-bottom:10px">✅ Рецептура утверждена — только директор меняет</p>':''}
    <label>Наименование</label><input id="gn" value="${esc(p.name)}" ${locked?'disabled':''}>
    <label>Категория</label><select id="gt">
      ${CATS.map(c=>`<option value="${c.id}" ${p.type===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('')}
    </select>
    <label>Единица</label><select id="gu"><option ${p.unit==='кг'?'selected':''}>кг</option><option ${p.unit==='шт'?'selected':''}>шт</option></select>
    <label>Исходный продукт для выработки (тип ⚖️)</label>
    <select id="gs"><option value="">— не используется —</option>${procs.map(r=>`<option value="${r.id}" ${p.sourceId===r.id?'selected':''}>${esc(r.name)}</option>`).join('')}</select>
    <label>Код в 1С</label><input id="gc" value="${esc(p.code1c||'')}">
    <div style="height:14px"></div>
    <button class="btn" onclick="nomSave('${id||''}')">Сохранить</button>
  </div>`;
};
window.nomSave = async id => {
  const body={type:$('#gt').value, unit:$('#gu').value, sourceId:$('#gs').value||null, code1c:$('#gc').value.trim()};
  if(!$('#gn').disabled) body.name=$('#gn').value.trim();
  if(body.name==='') return toast('Введите наименование');
  try{
    if(id) await api('/products/'+id,'PUT',body); else await api('/products','POST',body);
    toast('Сохранено'); await reload(); render();
  } catch(e){ toast(e.message); }
};

// ====== СПЕЦИИ И СПИСАНИЕ (менеджер/директор) ======
let woItems=[];
function scrWo(){
  const raws = D.products.filter(p=>p.type==='raw');
  return `<h2>🧂 Акт списания специй и прочего</h2>
  <div class="card static">
    <div id="worows">${woItems.map((it,i)=>{
      const c=P(it.productId);
      return `<div class="li">
        <span class="nm">${esc(c.name)}</span>
        <input type="number" step="0.01" inputmode="decimal" value="${it.qty}" data-wq="${i}" style="width:90px;text-align:center">
        <span class="sub" style="min-width:22px">${c.unit}</span>
        <button class="btn sec small" onclick="woDel(${i})">✕</button>
      </div>`;
    }).join('')}</div>
    <div class="row" style="margin-top:10px">
      <select id="woadd">${raws.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select>
      <button class="btn sec small" style="flex:0 0 auto" onclick="woAdd()">+ добавить</button>
    </div>
  </div>
  <div class="card static">
    <label>Причина списания</label>
    <select id="woreason">
      <option value="специи и приправы на производство">Специи и приправы</option>
      <option value="хозяйственные нужды">Хозяйственные нужды</option>
      <option value="порча и просрочка">Порча / просрочка</option>
      <option value="бой и потери при транспортировке">Бой / потери при транспортировке</option>
      <option value="прочее">Прочее</option>
    </select>
  </div>
  ${woItems.length?`<button class="btn red" onclick="woSave()">Списать</button>
  <p class="sub" style="margin-top:8px;text-align:center">После сохранения уйдёт документом СписаниеТМЗ в 1С</p>`:''}`;
}
function collectWo(){ document.querySelectorAll('[data-wq]').forEach(el=>{ woItems[+el.dataset.wq].qty=+el.value||0; }); }
window.woAdd = () => { collectWo(); woItems.push({productId:$('#woadd').value,qty:0}); renderInPlace(); };
window.woDel = i => { collectWo(); woItems.splice(i,1); renderInPlace(); };
window.woSave = async () => {
  collectWo();
  const items = woItems.filter(it=>it.qty>0);
  if(!items.length) return toast('Заполните количество');
  const reason = $('#woreason').value;
  try{
    await api('/ops','POST',{type:'writeoff',reason,items});
    toast('✅ Списано'); woItems=[]; await reload(); render();
  } catch(e){ toast(e.message); }
};

// ====== ОСТАТКИ ======
function scrStock(){
  const showMoney = ME.role==='admin';
  const list = D.products.filter(p=>p.type===stockTab);
  let totalVal=0;
  if(showMoney) D.products.forEach(p=>{ totalVal+=(D.stock[p.id]||{}).value||0; });
  return `${showMoney?`<div class="card static" style="display:flex;justify-content:space-between"><span>Стоимость всех остатков</span><b>${money(totalVal)}</b></div>`:''}
  <div class="tabbar">${CATS.map(c=>`<button class="${stockTab===c.id?'on':''}" onclick="stockTab='${c.id}';renderInPlace()">${c.icon} ${c.name}</button>`).join('')}</div>
  <div class="card static">
    ${list.map(p=>{
      const s=D.stock[p.id]||{qty:0};
      return `<div class="li"><span class="nm">${esc(p.name)}${showMoney?`<div class="sub">${money(s.avg||0)}/${p.unit}</div>`:''}</span>
        <span class="vl ${s.qty<-0.001?'neg':''}">${fmt(s.qty)} ${p.unit}</span></div>`;
    }).join('')||'<p class="sub">пусто</p>'}
  </div>
  ${ME.role==='admin'?`<button class="btn sec" onclick="go('inv')">Инвентаризация</button>`:''}`;
}

function scrInv(){
  const items = D.products.filter(p=>p.type!=='dish');
  return `<h2>Инвентаризация: фактические остатки</h2>
  <div class="card static">${items.map(p=>{
    const s=D.stock[p.id]||{qty:0};
    return `<div class="li"><span class="nm">${CAT(p.type).icon} ${esc(p.name)}<div class="sub">по учёту: ${fmt(s.qty)} ${p.unit}</div></span>
      <input data-inv="${p.id}" type="number" step="0.01" inputmode="decimal" placeholder="${fmt(s.qty)}" style="width:110px;text-align:center">
    </div>`;
  }).join('')}</div>
  <button class="btn" onclick="invSave()">Зафиксировать</button>
  <p class="sub" style="margin-top:8px;text-align:center">Пустое поле = без изменений.</p>`;
}
window.invSave = async () => {
  const items=[];
  document.querySelectorAll('[data-inv]').forEach(el=>{ if(el.value!=='') items.push({productId:el.dataset.inv,factQty:+el.value}); });
  if(!items.length) return toast('Ничего не введено');
  try{
    const r=await api('/ops','POST',{type:'inventory',items});
    toast('Готово. Расхождение: '+money(r.sum));
    screen='stock'; await reload(); render();
  } catch(e){ toast(e.message); }
};

// ====== ДИРЕКТОР: КАЛЬКУЛЯЦИЯ ======
async function scrCost(){
  const data = await api('/report/costing');
  const grouped={};
  data.forEach(d=>{ if(!grouped[d.type]) grouped[d.type]=[]; grouped[d.type].push(d); });
  return `<h2>Себестоимость сейчас</h2>
  <p class="sub" style="margin-bottom:12px">Из последних цен закупа. Нажмите строку — раскроется состав.</p>
  ${CATS.filter(cat=>grouped[cat.id]).map(cat=>`
    <div class="hist-label">${cat.icon} ${cat.name}</div>
    ${grouped[cat.id].map(d=>expandCard('c'+d.productId,
      `<span style="flex:1"><b>${esc(d.name)}</b> ${ST[d.status]}</span><b>${money(d.total)}<span class="sub">/${d.unit}</span></b>`,
      `<div class="rec-inner">${d.items.map(i=>`<div class="li">
        <span class="nm">${esc(i.name)}${i.hasRecipe?' <span class="pill ok" style="font-size:10px">рецепт</span>':''}
        <div class="sub">${fmt(i.qty)} ${i.unit==='кг'?'г':'шт'} × ${money(i.unitCost)}/${i.unit}</div></span>
        <span class="vl">${money(i.cost)}</span></div>`).join('')}</div>
      <div class="row" style="margin-top:8px">
        <button class="btn sec small" onclick="event.stopPropagation();showLog('${d.productId}','${esc(d.name)}')">📜 История</button>
        ${d.status==='approved'
          ?`<button class="btn sec small" onclick="event.stopPropagation();recStatus('${d.productId}','reopen','Вернуть на доработку?')">🔓 На доработку</button>`
          :`<button class="btn sec small" onclick="event.stopPropagation();recStatus('${d.productId}','approve','Утвердить рецептуру?')">✅ Утвердить</button>`}
      </div>`
    )).join('')}`).join('')||'<p class="sub">Нет рецептур.</p>'}`;
}
window.showLog = async (id,name) => {
  try{
    const log=await api('/recipes/'+id+'/log');
    const lines=log.slice().reverse().map(l=>new Date(l.ts).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})+' · '+l.user+': '+l.text).join('\n');
    alert('История «'+name+'»:\n\n'+(lines||'изменений не было'));
  } catch(e){ toast(e.message); }
};

// ====== ДИРЕКТОР: ВЫРАБОТКА ======
async function scrOutput(){
  const from=outFrom||today(), to=outTo||today();
  const r=await api('/report/output?from='+from+'&to='+to);
  const isAdmin=ME.role==='admin';
  const uStr=bu=>Object.entries(bu).map(([n,v])=>`${esc(n)}: ${typeof v==='object'?fmt(v.before)+'→'+fmt(v.after):fmt(v)}`).join(' · ');
  return `<h2>Выработка за период</h2>
  <div class="card static"><div class="row">
    <div><label>С</label><input type="date" value="${from}" onchange="outFrom=this.value;render()"></div>
    <div><label>По</label><input type="date" value="${to}" onchange="outTo=this.value;render()"></div>
  </div>
  <div class="row" style="margin-top:10px">
    <button class="btn sec small" onclick="outSet(0)">Сегодня</button>
    <button class="btn sec small" onclick="outSet(7)">Неделя</button>
    <button class="btn sec small" onclick="outSet(30)">Месяц</button>
  </div></div>
  <h2>Обработка продуктов</h2>
  ${r.processing.length?r.processing.map(m=>expandCard('op'+m.raw+m.semi,
    `<span style="flex:1"><b>${esc(m.raw)} → ${esc(m.semi)}</b></span>
     <span class="pill ${m.avgLossPct>35?'bad':m.avgLossPct>20?'warn':'ok'}">потери ${m.avgLossPct}%</span>`,
    `<div class="sub">${fmt(m.totalBefore)} → ${fmt(m.totalAfter)} ${m.unit} · операций: ${m.operations}</div>
     <div class="sub">${uStr(m.byUser)}</div>`
  )).join(''):'<p class="sub">Обработки за период не было.</p>'}
  <h2 style="margin-top:16px">Выпуск продукции</h2>
  ${r.production.length?r.production.map(m=>expandCard('pp'+m.name,
    `<span style="flex:1"><b>${esc(m.name)}</b></span><b>${fmt(m.count)} ${m.unit}</b>`,
    `<div class="sub">${isAdmin&&m.sum!==undefined?'на сумму '+money(m.sum)+' · ':''}${uStr(m.byUser)}</div>`
  )).join(''):'<p class="sub">Выпуска за период не было.</p>'}`;
}
window.outSet = days => {
  const d=new Date(); outTo=d.toISOString().slice(0,10);
  d.setDate(d.getDate()-days); outFrom=d.toISOString().slice(0,10);
  render();
};

// ====== ДИРЕКТОР: 1С ======
async function scrSync(){
  const d=syncDate||today();
  const r=await api('/1c/export?date='+d);
  const S=D.settings||{};
  const raws=D.products.filter(p=>p.type==='raw');
  return `<h2>Обмен с 1С</h2>
  <div class="card static">
    <h2>Склады в 1С</h2>
    <label>Основной склад (закуп)</label><input id="s1" value="${esc(S.skladMain)}">
    <label>Склад кухни</label><input id="s2" value="${esc(S.skladKitchen)}">
    <label>Склад готовой продукции</label><input id="s3" value="${esc(S.skladDone)}">
    <div style="height:10px"></div>
    <button class="btn sec" onclick="sklSave()">Сохранить склады</button>
  </div>
  <div class="card static">
    <label>Дата выгрузки</label>
    <input type="date" value="${d}" onchange="syncDate=this.value;render()">
    <div style="height:10px"></div>
    <p style="font-size:14px">Документов: <b>${r.Документы.length}</b></p>
    ${r.Документы.map(doc=>expandCard('doc'+doc.Время+doc.ВидДокумента,
      `<span style="flex:1"><b>${esc(doc.Комментарий)}</b></span>
       <span class="sub">${doc.Время}</span>`,
      `<div class="sub">${doc.ВидДокумента}${doc.Склад?' · '+esc(doc.Склад):''}${doc.СкладОтправитель?' · '+esc(doc.СкладОтправитель)+' → '+esc(doc.СкладПолучатель):''}</div>`
    )).join('')||'<p class="sub">За эту дату операций нет.</p>'}
    <div style="height:10px"></div>
    <button class="btn sec" onclick="syncCopy()">Скопировать JSON для 1С</button>
  </div>
  ${expandCard('rcpt',
    `<span style="flex:1"><b>📦 Ручной ввод поступления</b></span><span class="sub">до подключения 1С</span>`,
    `<label>Продукт</label>
     <select id="rp">${raws.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select>
     <div class="row">
       <div><label>Количество</label><input class="big" id="rq" type="number" step="0.01" inputmode="decimal"></div>
       <div><label>Цена ₸/ед.</label><input class="big" id="rc" type="number" step="0.01" inputmode="decimal"></div>
     </div>
     <div style="height:12px"></div>
     <button class="btn" onclick="rSave()">Оприходовать</button>
     <p class="sub" style="margin-top:8px">После подключения 1С этот блок исчезнет.</p>`,
    'card'
  )}`;
}
window.sklSave = async () => {
  try{ await api('/settings','PUT',{skladMain:$('#s1').value.trim(),skladKitchen:$('#s2').value.trim(),skladDone:$('#s3').value.trim()}); toast('Склады сохранены'); await reload(); render(); }
  catch(e){ toast(e.message); }
};
window.syncCopy = async () => {
  const r=await api('/1c/export?date='+(syncDate||today()));
  await navigator.clipboard.writeText(JSON.stringify(r,null,1));
  toast('JSON скопирован');
};
window.rSave = async () => {
  const q=+$('#rq').value, c=+$('#rc').value;
  if(!(q>0)||!(c>0)) return toast('Заполните количество и цену');
  try{ await api('/ops','POST',{type:'receipt',productId:$('#rp').value,qty:q,price:c}); toast('✅ Приход записан'); await reload(); render(); }
  catch(e){ toast(e.message); }
};

// ====== РОУТЕР ======
const SCREENS={work:scrWork,prod:scrProd,rec:scrRec,stock:scrStock,inv:scrInv,cost:scrCost,output:scrOutput,sync:scrSync,nom:scrNom,wo:scrWo};
async function render(){
  if(!ME) return renderLogin();
  const fn=SCREENS[screen]||scrStock;
  const out=fn();
  shell(out instanceof Promise?'<p class="sub">Загрузка…</p>':out);
  if(out instanceof Promise){
    try{ $('#m').innerHTML=await out; }
    catch(e){ $('#m').innerHTML=`<p class="sub">${esc(e.message)}</p>`; }
  }
}
(async()=>{
  if(ME){ try{ await reload(); } catch(e){ logout(); return; } }
  render();
})();
</script>
</body>
</html>
