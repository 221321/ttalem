<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ТТ Алем</title>
<style>
:root{--bg:#f6f5f2;--card:#fff;--ink:#1c1c1a;--mut:#8a8880;--line:#e4e2db;--acc:#1d6e56;--accbg:#e2f3ec;--red:#b3362e;--redbg:#fbeceb;--amb:#9a6b10;--ambbg:#faf0da;--blu:#1d4f8f;--blubg:#e5eefb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;padding-bottom:76px}
header{position:sticky;top:0;background:var(--bg);padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;z-index:5;border-bottom:1px solid var(--line)}
header h1{font-size:17px;font-weight:600}
header .who{font-size:12px;color:var(--mut)}
main{padding:12px 12px 20px;max-width:680px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.card.tap{cursor:pointer}
.card.tap:active{opacity:.85}
.cbody{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.grn{background:var(--acc)}
.btn.red{background:var(--red)}
.btn:disabled{opacity:.35}
.sm{font-size:13px;padding:8px 12px;width:auto;display:inline-block}
input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:var(--card);color:var(--ink)}
input.big{font-size:26px;font-weight:600;text-align:center}
label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
.row{display:flex;gap:8px}.row>*{flex:1}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.ok{background:var(--accbg);color:var(--acc)}.bad{background:var(--redbg);color:var(--red)}.warn{background:var(--ambbg);color:var(--amb)}.info{background:var(--blubg);color:var(--blu)}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:5}
nav button{flex:1;padding:9px 2px 11px;border:none;background:none;font-size:10px;color:var(--mut);cursor:pointer}
nav button.on{color:var(--ink);font-weight:600}
nav button .ic{font-size:18px;display:block;margin-bottom:2px}
.li{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:8px}
.li:last-child{border:none}
.li .nm{flex:1;font-size:14px}
.li .vl{font-weight:600;font-size:14px;white-space:nowrap}
.sub{font-size:11px;color:var(--mut)}
h2{font-size:14px;font-weight:600;margin:4px 0 10px}
.step{display:flex;align-items:center;gap:8px}
.step button{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:20px;cursor:pointer}
.step span{min-width:40px;text-align:center;font-size:19px;font-weight:600}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;z-index:99;opacity:0;transition:.25s;max-width:92%;text-align:center}
.toast.show{opacity:1}
.alert-bar{background:var(--redbg);border:1px solid #f0b8b5;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:var(--red)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:16px auto}
.pinpad button{padding:17px;font-size:21px;border:1px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer}
.dots{text-align:center;font-size:28px;letter-spacing:10px;min-height:36px}
.search{position:relative;margin-bottom:10px}
.search input{padding-left:36px}
.search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.srlist{background:var(--card);border:1px solid var(--line);border-radius:10px;max-height:260px;overflow-y:auto}
.sritem{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--line);font-size:15px}
.sritem:last-child{border:none}
.sritem:active{background:var(--bg)}
.tabbar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.tabbar button{padding:8px 14px;border-radius:99px;border:1px solid var(--line);background:var(--card);font-size:13px;white-space:nowrap;cursor:pointer}
.tabbar button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chev{font-size:11px;color:var(--mut);transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(90deg)}
.done{background:var(--accbg);border:1px solid #bfe3d4;border-radius:14px;padding:14px;margin-bottom:10px;text-align:center}
.hl{font-size:12px;color:var(--mut);margin:14px 0 5px;font-weight:600}
/* таблица остатков */
.stock-table{width:100%;border-collapse:collapse;font-size:13px}
.stock-table th{background:var(--bg);padding:8px 6px;text-align:right;font-weight:600;border-bottom:1px solid var(--line)}
.stock-table th:first-child{text-align:left}
.stock-table td{padding:8px 6px;text-align:right;border-bottom:1px solid var(--line)}
.stock-table td:first-child{text-align:left;font-size:13px}
.stock-table tr:last-child td{border:none}
.neg{color:var(--red)}.pos{color:var(--acc)}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
let TOKEN = sessionStorage.getItem('tok') || '';
let ME = JSON.parse(sessionStorage.getItem('me') || 'null');
let D = { products: [], stock: {}, sklads: [], alerts: [] };
let screen = 'work';
let pin = '', pickedUser = null;
let exp = {}, busy = false;
// per-screen state
let wSel = null, wDone = null, wQ = '';
let pCnt = {}, pDate = null, pQ = '';
let stockTab = '', nomTab = 'raw', recFilter = 'all';
let outFrom = null, outTo = null;
let syncDate = null;
let woItems = [], woQ = '';
let moveQ = '', movePid = null, moveFrom = '', moveTo = '';
let invQ = '', invTab = 'form';

const $ = s => document.querySelector(s);
const app = $('#app');
const fmt = n => (Math.round((+n||0)*100)/100).toLocaleString('ru-RU');
const money = n => fmt(n) + ' ₸';
const today = () => new Date().toISOString().slice(0,10);
const P = id => D.products.find(p => p.id === id) || {name:'?',unit:'',recipe:[],type:'raw'};
const SK = id => D.sklads.find(s => s.id === id) || {name:id||'—'};
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ROLE = {cook:'повар',cook_prep:'повар заготовок',cook_sand:'повар сэндвичей',cook_hot:'повар горячего',cook_baker:'пекарь',cook_pastry:'кондитер',cook_head:'главный повар',tech:'менеджер',admin:'директор'};
const isCook = r => r==='cook'||r.startsWith('cook_');
const hasRecipe = p => p&&p.recipe&&p.recipe.length>0;
const CATS = [
  {id:'raw',icon:'🛒',name:'Продукты'},
  {id:'process',icon:'⚖️',name:'Выработка'},
  {id:'semi',icon:'🧊',name:'Полуфабрикаты'},
  {id:'bread',icon:'🍞',name:'Хлеб и тесто'},
  {id:'dish',icon:'🥪',name:'Готовые блюда'},
];
const CAT = id => CATS.find(c=>c.id===id)||{icon:'📦',name:id};
const ST = {
  draft:     '<span class="pill warn">✏️ черновик</span>',
  submitted: '<span class="pill info">📨 у менеджера</span>',
  approved:  '<span class="pill ok">✅ утверждена</span>',
};
const UNITS = ['кг','г','шт','л','мл'];

function toast(msg,ms){ const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms||2400); }
async function api(path,method,body){
  const r=await fetch('/api'+path,{method:method||'GET',headers:{'Content-Type':'application/json','x-token':TOKEN},body:body?JSON.stringify(body):undefined});
  const j=await r.json();
  if(r.status===401&&ME){logout();throw new Error('Сессия истекла');}
  if(!r.ok) throw new Error(j.error||'Ошибка');
  return j;
}
function logout(){TOKEN='';ME=null;sessionStorage.clear();pickedUser=null;pin='';render();}
async function reload(){ D=await api('/bootstrap'); if(!stockTab&&D.sklads.length) stockTab=D.sklads[0].id; }
function opTime(o){return new Date(o.ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});}

// ====== свернуть/развернуть ======
window.toggle=key=>{exp[key]=!exp[key];renderInPlace();};
function card(key,hdr,body,cls){
  const open=exp[key];
  return `<div class="card tap ${cls||''}" onclick="toggle('${key}')">
    <div style="display:flex;justify-content:space-between;align-items:center">${hdr}<span class="chev ${open?'open':''}">▶</span></div>
    ${open?`<div class="cbody" onclick="event.stopPropagation()">${body}</div>`:''}
  </div>`;
}

// ====== поиск ======
function searchBox(id,q,ph){
  return `<div class="search"><input id="${id}" placeholder="${ph||'Поиск...'}" value="${esc(q)}" oninput="onSearch('${id}',this.value)" autocomplete="off"></div>`;
}
window.onSearch=(id,v)=>{
  if(id==='wq') wQ=v;
  else if(id==='pq') pQ=v;
  else if(id==='woq') woQ=v;
  else if(id==='mvq') moveQ=v;
  else if(id==='invq') invQ=v;
  renderInPlace();
};
function filter(list,q){ const lo=q.toLowerCase(); return lo?list.filter(p=>p.name.toLowerCase().includes(lo)):list; }

// ====== ВХОД ======
async function renderLogin(){
  const users=await(await fetch('/api/users')).json();
  if(!pickedUser){
    app.innerHTML=`<main style="padding-top:40px">
      <h1 style="text-align:center;font-size:22px;margin-bottom:4px">ТТ Алем</h1>
      <p style="text-align:center;color:var(--mut);font-size:14px;margin-bottom:24px">Кто вы?</p>
      ${users.map(u=>`<button class="btn sec" style="margin-bottom:10px;padding:16px;text-align:left" onclick="pickUser('${u.id}')">${esc(u.name)} <span class="sub">· ${ROLE[u.role]||u.role}</span></button>`).join('')}
    </main>`;
    return;
  }
  app.innerHTML=`<main style="padding-top:40px;text-align:center">
    <h1 style="font-size:20px">${esc(pickedUser.name)}</h1>
    <p style="color:var(--mut);font-size:14px;margin:6px 0 10px">Введите PIN</p>
    <div class="dots" id="dots"></div>
    <div class="pinpad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinKey(${n})">${n}</button>`).join('')}
      <button onclick="pickedUser=null;pin='';render()" style="font-size:14px">Назад</button>
      <button onclick="pinKey(0)">0</button>
      <button onclick="pin=pin.slice(0,-1);drawDots()" style="font-size:16px">⌫</button>
    </div>
  </main>`;
  drawDots();
}
window.pickUser=id=>fetch('/api/users').then(r=>r.json()).then(us=>{pickedUser=us.find(u=>u.id===id);pin='';render();});
function drawDots(){const d=$('#dots');if(d)d.textContent='●'.repeat(pin.length);}
window.pinKey=async n=>{
  pin+=n;drawDots();
  if(pin.length===4){
    try{
      const r=await api('/login','POST',{userId:pickedUser.id,pin});
      TOKEN=r.token;ME=r.user;
      sessionStorage.setItem('tok',TOKEN);sessionStorage.setItem('me',JSON.stringify(ME));
      screen=isCook(ME.role)?'work':ME.role==='tech'?'rec':'cost';
      await reload();render();
    }catch(e){toast(e.message);pin='';drawDots();}
  }
};

// ====== КАРКАС ======
const NAVS={
  cook:       [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['rec','📖','Рецептуры'],['output','📊','Выработка'],['stock','📋','Остатки']],
  cook_prep:  [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['rec','📖','Рецептуры'],['output','📊','Выработка'],['stock','📋','Остатки']],
  cook_sand:  [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['rec','📖','Рецептуры'],['output','📊','Выработка'],['stock','📋','Остатки']],
  cook_hot:   [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['rec','📖','Рецептуры'],['output','📊','Выработка'],['stock','📋','Остатки']],
  cook_baker: [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['rec','📖','Рецептуры'],['output','📊','Выработка'],['stock','📋','Остатки']],
  cook_pastry:[['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['rec','📖','Рецептуры'],['output','📊','Выработка'],['stock','📋','Остатки']],
  cook_head:  [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['rec','📖','Рецептуры'],['output','📊','Выработка'],['stock','📋','Остатки'],['move','🔄','Переместить']],
  tech:       [['nom','🏷️','Продукты'],['rec','📖','Рецептуры'],['wo','🧂','Специи'],['output','📊','Выработка'],['stock','📋','Остатки']],
  admin:      [['cost','💰','Калькуляция'],['output','📊','Выработка'],['stock','📋','Остатки'],['sync','🔄','1С']],
}
