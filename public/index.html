<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ТТ Алем</title>
<style>
:root{--bg:#f6f5f2;--card:#fff;--ink:#1c1c1a;--mut:#8a8880;--line:#e4e2db;--acc:#1d6e56;--accbg:#e2f3ec;--red:#b3362e;--redbg:#fbeceb;--amb:#9a6b10;--ambbg:#faf0da;--blu:#1d4f8f;--blubg:#e5eefb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;padding-bottom:76px}
header{position:sticky;top:0;background:var(--bg);padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;z-index:5;border-bottom:1px solid var(--line)}
header h1{font-size:17px;font-weight:600}
header .who{font-size:12px;color:var(--mut)}
main{padding:12px 12px 20px;max-width:680px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.tap{cursor:pointer}.tap:active{opacity:.85}
.cbody{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.grn{background:var(--acc)}
.btn.red{background:var(--red)}
.btn:disabled{opacity:.35}
.sm{font-size:13px;padding:8px 12px;width:auto;display:inline-block}
input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:var(--card);color:var(--ink)}
input.big{font-size:26px;font-weight:600;text-align:center}
label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
.row{display:flex;gap:8px}.row>*{flex:1}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.ok{background:var(--accbg);color:var(--acc)}.bad{background:var(--redbg);color:var(--red)}.warn{background:var(--ambbg);color:var(--amb)}.info{background:var(--blubg);color:var(--blu)}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:5}
nav button{flex:1;padding:12px 2px;border:none;background:none;font-size:11px;color:var(--mut);cursor:pointer;line-height:1.2}
nav button.on{color:var(--ink);font-weight:700}
nav button .ic{display:none}
.li{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:8px}
.li:last-child{border:none}
.li .nm{flex:1;font-size:14px}
.li .vl{font-weight:600;font-size:14px;white-space:nowrap}
.sub{font-size:11px;color:var(--mut)}
h2{font-size:14px;font-weight:600;margin:4px 0 10px}
.step{display:flex;align-items:center;gap:8px}
.step button{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:20px;cursor:pointer}
.step span{min-width:40px;text-align:center;font-size:19px;font-weight:600}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;z-index:99;opacity:0;transition:.25s;max-width:92%;text-align:center}
.toast.show{opacity:1}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:16px auto}
.pinpad button{padding:17px;font-size:21px;border:1px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer}
.dots{text-align:center;font-size:28px;letter-spacing:10px;min-height:36px}
.search{position:relative;margin-bottom:10px}
.search input{padding-left:36px}
.search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.search .clr{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--mut);cursor:pointer;display:none;padding:4px}
.srlist{background:var(--card);border:1px solid var(--line);border-radius:10px;max-height:260px;overflow-y:auto;margin-top:4px}
.worklist{max-height:320px;overflow-y:auto;margin-bottom:8px}
.sritem{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--line);font-size:14px}
.sritem:last-child{border:none}
.sritem:active{background:var(--bg)}
.tabbar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.tabbar button{padding:8px 14px;border-radius:99px;border:1px solid var(--line);background:var(--card);font-size:13px;white-space:nowrap;cursor:pointer}
.tabbar button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chev{font-size:11px;color:var(--mut);transition:transform .2s;display:inline-block;margin-right:4px}
.chev.open{transform:rotate(90deg)}
.done{background:var(--accbg);border:1px solid #bfe3d4;border-radius:14px;padding:14px;margin-bottom:10px;text-align:center}
.hl{font-size:12px;color:var(--mut);margin:14px 0 5px;font-weight:600}
.neg{color:var(--red)}
/* ===== ПК: меню слева, контент по центру ===== */
@media(min-width:900px){
  body{padding-bottom:20px}
  header{position:fixed;top:0;left:0;right:0;padding:16px 24px 12px;height:56px;z-index:6}
  nav{top:56px;bottom:0;left:0;right:auto;width:220px;flex-direction:column;border-top:none;border-right:1px solid var(--line);justify-content:flex-start;overflow-y:auto}
  nav button{flex:0 0 auto;width:100%;text-align:left;font-size:15px;padding:14px 22px;border-left:3px solid transparent}
  nav button.on{border-left-color:var(--ink);background:var(--bg)}
  main{margin-left:220px;margin-top:56px;max-width:860px;padding:24px 32px}
  .card{padding:18px}
  input,select{font-size:15px}
  .btn{max-width:420px;margin-left:auto;margin-right:auto}
  .tabbar button{font-size:14px;padding:9px 18px}
}
/* ===== телефон: крупные кнопки, всё влезает ===== */
@media(max-width:899px){
  nav{padding-bottom:env(safe-area-inset-bottom)}
  nav button{font-size:12px;font-weight:600;padding:15px 1px 17px}
  main{padding:12px 10px 20px}
  body{padding-bottom:90px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
var TOKEN = sessionStorage.getItem('tok') || '';
var ME = JSON.parse(sessionStorage.getItem('me') || 'null');
var D = { products: [], stock: {}, sklads: [], alerts: [] };
var screen = 'work';
var pin = '', pickedUser = null;
var exp = {}, busy = false;
var wSel = null, wDone = null, wQ = '';
var pCnt = {}, pDate = null, pFrom = null, pTo = null;
var stockTab = 'raw', nomTab = 'raw', recFilter = 'all';
var outFrom = null, outTo = null;
var syncDate = null, rcptOpen = false;
var woItems = [], woQ = '';
var editRecipe = [];

var $ = function(s){ return document.querySelector(s); };
var app = $('#app');
var fmt = function(n){ return (Math.round((+n||0)*100)/100).toLocaleString('ru-RU'); };
var money = function(n){ return fmt(n) + ' ₸'; };
var today = function(){ return new Date().toISOString().slice(0,10); };
var P = function(id){ return D.products.find(function(p){ return p.id===id; }) || {name:'?',unit:'',recipe:[],type:'raw',skladId:'sk2'}; };
var SK = function(id){ return (D.sklads||[]).find(function(s){ return s.id===id; }) || {name:id||'—'}; };
var esc = function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); };
var ROLE = {cook:'повар',cook_prep:'повар заготовок',cook_sand:'повар сэндвичей',cook_hot:'повар горячего',cook_baker:'пекарь',cook_pastry:'кондитер',cook_head:'главный повар',tech:'менеджер',admin:'директор'};
var isCook = function(r){ return r==='cook'||r.startsWith('cook_'); };
var hasRecipe = function(p){ return p&&p.recipe&&p.recipe.length>0; };
var CATS = [
  {id:'raw',icon:'🛒',name:'Продукты'},
  {id:'process',icon:'⚖️',name:'Выработка'},
  {id:'semi',icon:'🧊',name:'Полуфабрикаты'},
  {id:'bread',icon:'🍞',name:'Хлеб и тесто'},
  {id:'dish',icon:'🥪',name:'Готовые блюда'}
];
var CAT = function(id){ return CATS.find(function(c){ return c.id===id; }) || {icon:'📦',name:id||''}; };
var UNITS = ['кг','г','шт','л','мл'];
var ST = {
  draft:'<span class="pill warn">✏️ черновик</span>',
  submitted:'<span class="pill info">📨 у менеджера</span>',
  approved:'<span class="pill ok">✅ утверждена</span>'
};

function toast(msg,ms){ var t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){ t.classList.remove('show'); },ms||2400); }
async function api(path,method,body){
  var r=await fetch('/api'+path,{method:method||'GET',headers:{'Content-Type':'application/json','x-token':TOKEN},body:body?JSON.stringify(body):undefined});
  var j=await r.json();
  if(r.status===401&&ME){logout();throw new Error('Сессия истекла');}
  if(!r.ok) throw new Error(j.error||'Ошибка');
  return j;
}
function logout(){ TOKEN='';ME=null;sessionStorage.clear();pickedUser=null;pin='';render(); }
async function reload(){ D=await api('/bootstrap'); if(!stockTab&&D.sklads&&D.sklads.length) stockTab=D.sklads[0].id; }
function opTime(o){ return new Date(o.ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
function filterList(list,q){ var lo=q.toLowerCase(); return lo?list.filter(function(p){ return p.name.toLowerCase().includes(lo); }):list; }

// свернуть/развернуть
window.toggle=function(key){ exp[key]=!exp[key]; renderInPlace(); };
function card(key,hdr,body){
  var open=exp[key];
  return '<div class="card tap" onclick="toggle(\''+key+'\')">'
    +'<div style="display:flex;justify-content:space-between;align-items:center">'+hdr+'<span class="chev '+(open?'open':'')+'">▶</span></div>'
    +(open?'<div class="cbody" onclick="event.stopPropagation()">'+body+'</div>':'')
    +'</div>';
}

// ====== ВХОД ======
async function renderLogin(){
  app.innerHTML='<main style="padding-top:60px;max-width:400px;margin:0 auto">'
    +'<h1 style="text-align:center;font-size:24px;margin-bottom:30px">ТТ Алем</h1>'
    +'<div class="card" style="padding:24px">'
    +'<label style="font-size:14px">Роль</label>'
    +'<select id="logincat" style="font-size:17px;padding:14px">'
    +'<option value="cook">Повар</option>'
    +'<option value="tech">Менеджер</option>'
    +'<option value="admin">Директор</option>'
    +'</select>'
    +'<label style="font-size:14px">Пароль</label>'
    +'<input id="loginpin" type="password" inputmode="numeric" placeholder="****" style="font-size:22px;padding:14px;text-align:center;letter-spacing:6px" onkeydown="if(event.key===\'Enter\')doLogin()">'
    +'<div style="height:20px"></div>'
    +'<button class="btn" onclick="doLogin()">Войти</button>'
    +'</div></main>';
}
window.doLogin=async function(){
  var cat=$('#logincat').value, pinVal=$('#loginpin').value;
  if(!pinVal) return toast('Введите пароль');
  try{
    var r=await api('/login','POST',{category:cat,pin:pinVal});
    TOKEN=r.token; ME=r.user;
    sessionStorage.setItem('tok',TOKEN); sessionStorage.setItem('me',JSON.stringify(ME));
    screen=isCook(ME.role)?'work':ME.role==='tech'?'nom':'cost';
    await reload(); render();
  }catch(e){ toast(e.message); $('#loginpin').value=''; }
};

// ====== КАРКАС ======
var NAVS={
  cook:      [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['stock','📋','Остатки']],
  cook_prep: [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['stock','📋','Остатки']],
  cook_sand: [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['stock','📋','Остатки']],
  cook_hot:  [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['stock','📋','Остатки']],
  cook_baker:[['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['stock','📋','Остатки']],
  cook_pastry:[['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['stock','📋','Остатки']],
  cook_head: [['work','⚖️','Обработка'],['prod','🥪','Выпуск'],['nom','🏷️','Продукты'],['stock','📋','Остатки'],['move','🔄','Переместить']],
  tech:      [['nom','🏷️','Продукты'],['wo','🧂','Специи'],['output','📊','Выработка'],['stock','📋','Остатки']],
  admin:     [['cost','💰','Калькуляция'],['output','📊','Выработка'],['stock','📋','Остатки'],['sync','🔄','1С']]
};
function shell(inner){
  var navs=NAVS[ME.role]||NAVS.admin;
  var navHtml=navs.map(function(n){
    return '<button class="'+(screen===n[0]?'on':'')+'" onclick="go(\''+n[0]+'\')">'
      +'<span class="ic">'+n[1]+'</span>'+n[2]+'</button>';
  }).join('');
  app.innerHTML='<header><h1>ТТ Алем</h1><span class="who">'+esc(ME.name)+' · '+(ROLE[ME.role]||ME.role)+' · <a href="#" onclick="logout();return false" style="color:var(--mut)">выйти</a></span></header>'
    +'<main id="m">'+inner+'</main>'
    +'<nav>'+navHtml+'</nav>';
}
window.go=async function(s){ screen=s;wSel=null;wDone=null;exp={};await reload();render(); };
window.logout=logout;

function renderInPlace(){
  var fn=SCREENS[screen]; if(!fn) return;
  var out=fn();
  if(out instanceof Promise) out.then(function(h){ if($('#m')) $('#m').innerHTML=h; }).catch(function(e){ if($('#m')) $('#m').innerHTML='<p class="sub">'+esc(e.message)+'</p>'; });
  else if($('#m')) $('#m').innerHTML=out;
}

// ====== ПОВАР: ОБРАБОТКА ======
async function scrWork(){
  var procs=D.products.filter(function(p){ return p.type==='process'&&p.sourceId; });
  var filtered=filterList(procs,wQ);
  var myOps=await api('/ops?date='+today()+'&type=processing&mine=1');
  var hist='';
  if(myOps.length){
    hist='<div class="hl">Обработано сегодня:</div>'
      +myOps.slice().reverse().map(function(o){
        return card('hw'+o.id,
          '<span><b>'+esc(P(o.rawId).name)+'</b> → '+esc(P(o.semiId).name)+' <span class="sub">'+opTime(o)+'</span></span>',
          fmt(o.qtyBefore)+' → '+fmt(o.qtyAfter)+' '+P(o.rawId).unit+' · потери '+o.lossPct+'%'
        );
      }).join('');
  }
  if(wDone){
    var d=wDone; wDone=null;
    return '<div class="done"><div style="font-size:34px">✅</div>'
      +'<b>Записано!</b><br>'+esc(P(d.rawId).name)+': '+fmt(d.qtyBefore)+' → '+fmt(d.qtyAfter)+' '+P(d.rawId).unit+'<br>'
      +'<span class="sub">Потери '+d.lossPct+'% · '+opTime(d)+'</span></div>'
      +'<button class="btn" onclick="wSel=null;wQ=\'\';render()">Обработать ещё</button>'+hist;
  }
  if(!wSel){
    var listHtml=procs.map(function(s){
      var raw=P(s.sourceId);
      return '<div class="card tap work-item" data-name="'+esc((raw.name+' '+s.name).toLowerCase())+'" onclick="wPick(\''+s.id+'\')"><b>'+esc(raw.name)+'</b> → '+esc(s.name)+'</div>';
    }).join('') || '<p class="sub">Пока нет пар для обработки.</p>';
    return '<div class="search"><input id="workSearch" placeholder="Найти продукт для обработки..." oninput="wSearch(this.value)" autocomplete="off"><span class="clr" onclick="wClear()">✕</span></div>'
      +'<div class="worklist">'+listHtml+'</div>'+hist;
  }
  var s=P(wSel), raw=P(s.sourceId);
  return '<button class="btn sec sm" onclick="wSel=null;render()">← Назад</button>'
    +'<div class="card" style="margin-top:10px">'
    +'<span class="pill ok">'+esc(raw.name)+' → '+esc(s.name)+'</span>'
    +'<label>Вес ДО обработки, '+raw.unit+'</label>'
    +'<input class="big" id="wb" type="number" step="0.01" inputmode="decimal" oninput="wCalc()">'
    +'<label>Вес ПОСЛЕ обработки, '+raw.unit+'</label>'
    +'<input class="big" id="wa" type="number" step="0.01" inputmode="decimal" oninput="wCalc()">'
    +'<div id="wloss" style="margin:12px 0;text-align:center;font-size:15px;color:var(--mut)">Введите оба веса</div>'
    +'<button class="btn" id="wgo" disabled onclick="wSave()">Записать</button>'
    +'</div>'+hist;
}
window.wPick=function(id){ wSel=id; history.pushState({},''); render(); };
window.wSearch=function(v){
  filterDom(v,'work-item');
  var c=document.querySelector('.search .clr');
  if(c) c.style.display=v?'block':'none';
};
window.wClear=function(){
  var i=$('#workSearch');
  if(i) i.value='';
  wSearch('');
  if(i) i.focus();
};
  window.wCalc=function(){
  var b=+$('#wb').value, a=+$('#wa').value, el=$('#wloss'), btn=$('#wgo');
  if(b>0&&a>0&&a<=b){ el.innerHTML='Потери: <b>'+((1-a/b)*100).toFixed(1)+'%</b>'; btn.disabled=false; }
  else if(a>b){ el.textContent='Вес ПОСЛЕ больше ДО — проверьте'; btn.disabled=true; }
  else { el.textContent='Введите оба веса'; btn.disabled=true; }
};
window.wSave=async function(){
  if(busy) return;
  var s=P(wSel), b=+$('#wb').value, a=+$('#wa').value;
  if(!s.sourceId){ toast('У продукта не указан исходный — настройте в Продуктах'); return; }
  try{
    busy=true; $('#wgo').disabled=true;
    var recent=await api('/ops?date='+today()+'&type=processing&mine=1');
    var dup=recent.find(function(o){ return o.semiId===wSel&&(Date.now()-new Date(o.ts))<10*60*1000; });
    if(dup&&!confirm('Вы уже записывали «'+P(dup.rawId).name+'» в '+opTime(dup)+'.\n\nЭто НОВАЯ партия?')){
      busy=false; if($('#wgo')) $('#wgo').disabled=false; return;
    }
    var r=await api('/ops','POST',{type:'processing',rawId:s.sourceId,semiId:wSel,qtyBefore:b,qtyAfter:a});
    wDone=r; wSel=null; render();
  }catch(e){ toast(e.message); if($('#wgo')) $('#wgo').disabled=false; }
  busy=false;
};

// ====== ПОВАР: ВЫПУСК ======
async function scrProd(){
  var approved=D.products.filter(function(p){ return hasRecipe(p)&&p.recipeStatus==='approved'; });
  var from=pFrom||today(), to=pTo||today();
  var dayOps=await api('/ops?from='+from+'&to='+to+'&type=production');
  var anyCnt=Object.values(pCnt).some(function(v){ return v>0; });
  var listHtml=approved.map(function(d){
    return '<div class="li prod-item" data-name="'+esc(d.name.toLowerCase())+'">'
      +'<span class="nm">'+CAT(d.type).icon+' '+esc(d.name)+'</span>'
      +'<span class="step">'
      +'<button onclick="pStep(\''+d.id+'\',-1)">−</button>'
      +'<span>'+(pCnt[d.id]||0)+'</span>'
      +'<button onclick="pStep(\''+d.id+'\',1)">+</button>'
      +'</span></div>';
  }).join('');
  var histHtml=dayOps.length ? dayOps.slice().reverse().map(function(o){
    var ing=P(o.productId).recipe.map(function(it){ return '<div class="sub">'+esc(P(it.productId).name)+': '+fmt(it.qty)+' '+P(it.productId).unit+'</div>'; }).join('');
    return card('ph'+o.id,
      '<span><b>'+CAT(P(o.productId).type).icon+' '+esc(P(o.productId).name)+' × '+fmt(o.count)+'</b> <span class="sub">'+opTime(o)+'</span></span>',
      ing
    );
}).join('') : '<p class="sub">За этот период выпуска не было.</p>';
  return '<h2>Выпуск готовой продукции</h2>'
    +'<div class="search"><input id="prodSearch" placeholder="Найти блюдо..." oninput="pSearch(this.value)" autocomplete="off"><span class="clr" onclick="pClear()">✕</span></div>'
    +(approved.length
      ? '<div class="card">'+listHtml+'</div><button class="btn" '+(anyCnt?'':'disabled')+' onclick="pSave()">Записать выпуск</button>'
      : '<div class="card"><p class="sub">Нет утверждённых рецептур. Проверьте раздел «Рецептуры».</p></div>')
    +'<div class="hl">История выпуска</div>'
    +'<div class="row"><div><label>С</label><input type="date" value="'+from+'" onchange="pFrom=this.value;render()"></div>'
    +'<div><label>По</label><input type="date" value="'+to+'" onchange="pTo=this.value;render()"></div></div>'
    +'<button class="btn sec sm" onclick="pSet(0)">Сегодня</button> '
    +'<button class="btn sec sm" onclick="pSet(7)">Неделя</button> '

      +'<span class="nm">'+(nested?'<span class="chev '+(exp[key]?'open':'')+'" style="display:inline">▶</span> ':'')+esc(c.name)

async function scrStock(){

        +(showMoney?'<th style="text-align:right;padding:6px;border-bottom:1px solid var(--line)">Сумма</th>':'')
        +'</tr>'
        +byType[cat.id].map(function(r){
          var rowSum=Object.values(r.bySkl||{}).reduce(function(a,s){ return a+s.value; },0);
          return '<tr><td style="padding:6px;border-bottom:1px solid var(--line)">'+esc(r.name)+'</td>'

            +'</tr>';
        }).join('')+'</table></div>'
      );

  return tabsHtml+'<div class="card">'+filtered.map(function(r){
    var qty=stockTab?(r.bySkl&&r.bySkl[stockTab]?r.bySkl[stockTab].qty:0):r.total.qty;

  }).join('')+'</div>';
}

async function scrSync(){
  var d=syncDate||today();
  var r=await api('/1c/export?date='+d);
  var S=D.settings||{};
  var raws=D.products.filter(function(p){ return p.type==='raw'; });
  var docsHtml=r.Документы.map(function(doc){
    return card('doc'+doc.Время+doc.ВидДокумента,
      '<span style="flex:1"><b>'+esc(doc.Комментарий)+'</b></span><span class="sub">'+doc.Время+'</span>',
      '<div class="sub">'+doc.ВидДокумента+(doc.Склад?' · '+esc(doc.Склад):'')+(doc.СкладОтправитель?' · '+esc(doc.СкладОтправитель)+' → '+esc(doc.СкладПолучатель):'')+'</div>'
    );
  }).join('') || '<p class="sub">За эту дату операций нет.</p>';
  var rcptHtml='<div class="card"><label>Продукт</label><select id="rp">'+raws.map(function(p){ return '<option value="'+p.id+'">'+esc(p.name)+'</option>'; }).join('')+'</select>'
    +'<div class="row"><div><label>Количество</label><input class="big" id="rq" type="number" step="0.01" inputmode="decimal" onclick="event.stopPropagation()"></div>'
    +'<div><label>Цена ₸/ед.</label><input class="big" id="rc" type="number" step="0.01" inputmode="decimal" onclick="event.stopPropagation()"></div></div>'
    +'<div style="height:10px"></div><button class="btn" onclick="event.stopPropagation();rSave()">Оприходовать</button>'
    +'<p class="sub" style="margin-top:8px">Временно. После подключения 1С этот блок исчезнет.</p></div>';
  return '<h2>Обмен с 1С</h2>'
    +'<div class="card"><label>Дата выгрузки</label>'
    +'<input type="date" value="'+d+'" onchange="syncDate=this.value;render()">'
    +'<div style="height:8px"></div>'
    +'<p style="font-size:13px">Документов: <b>'+r.Документы.length+'</b></p>'
    +docsHtml
    +'<div style="height:8px"></div>'
    +'<button class="btn sec" onclick="syncCopy()">Скопировать JSON для 1С</button></div>'
    +card('rcpt','<span style="flex:1"><b>📦 Ручной ввод поступления</b></span><span class="sub">до подключения 1С</span>',rcptHtml);
}
window.syncCopy=async function(){
  var r=await api('/1c/export?date='+(syncDate||today()));
  await navigator.clipboard.writeText(JSON.stringify(r,null,1));
  toast('JSON скопирован');
};
window.rSave=async function(){
  var q=+$('#rq').value, c=+$('#rc').value;
  if(!(q>0)||!(c>0)) return toast('Заполните количество и цену');
  try{ await api('/ops','POST',{type:'receipt',productId:$('#rp').value,qty:q,price:c}); toast('✅ Приход записан'); await reload(); render(); }
  catch(e){ toast(e.message); }
};

// ====== ПЕРЕМЕЩЕНИЕ ======
var movePid=null, moveQ='', moveFrom='', moveTo='';
function scrMove(){
  var prods=D.products.filter(function(p){ return p.type!=='dish'; });
  var filtered=filterList(prods,moveQ);
  var skls=(D.sklads||[]).filter(function(s){ return !s.is1cMain; });
  return '<h2>🔄 Перемещение между складами</h2>'
    +'<div class="search"><input placeholder="Найти продукт..." oninput="mvSearch(this.value)" autocomplete="off"></div>'
    +'<div id="mvlist"></div>'
    +(movePid?'<div class="card"><b>'+esc(P(movePid).name)+'</b> <button class="btn sec sm" style="display:inline-block;margin-left:8px" onclick="movePid=null;renderInPlace()">✕</button>'
      +'<div class="row"><div><label>Откуда</label><select id="mfrom">'+skls.map(function(s){ return '<option value="'+s.id+'">'+esc(s.name)+'</option>'; }).join('')+'</select></div>'
      +'<div><label>Куда</label><select id="mto">'+skls.map(function(s){ return '<option value="'+s.id+'">'+esc(s.name)+'</option>'; }).join('')+'</select></div></div>'
      +'<label>Количество, '+esc(P(movePid).unit)+'</label><input class="big" id="mqty" type="number" step="0.01" inputmode="decimal">'
      +'<div style="height:10px"></div><button class="btn" onclick="moveSave()">Переместить</button></div>':'');
}
window.mvSearch=function(q){
  var el=$('#mvlist'); if(!el) return;
  if(!q||movePid){ el.innerHTML=''; return; }
  var prods=D.products.filter(function(p){ return p.type!=='dish'; });
  var res=filterList(prods,q).slice(0,8);
  el.innerHTML='<div class="srlist">'+(res.map(function(p){ return '<div class="sritem" onclick="movePid=\''+p.id+'\';history.pushState({},\'\');renderInPlace()">'+CAT(p.type).icon+' '+esc(p.name)+'</div>'; }).join('')||'<div class="sritem sub">Ничего</div>')+'</div>';
};
window.moveSave=async function(){
  var qty=+$('#mqty').value, from=$('#mfrom').value, to=$('#mto').value;
  if(!(qty>0)) return toast('Введите количество');
  if(from===to) return toast('Склады совпадают');
  try{ await api('/ops','POST',{type:'move',productId:movePid,fromSkId:from,toSkId:to,qty:qty}); toast('✅ Перемещено'); movePid=null; moveQ=''; await reload(); renderInPlace(); }
  catch(e){ toast(e.message); }
};

// ====== РОУТЕР ======
var SCREENS={work:scrWork,prod:scrProd,stock:scrStock,inv:scrInv,cost:scrCost,output:scrOutput,sync:scrSync,nom:scrNom,wo:scrWo,move:scrMove};
async function render(){
  if(!ME) return renderLogin();
  var fn=SCREENS[screen]||scrStock;
  var out=fn();
  shell(out instanceof Promise?'<p class="sub">Загрузка…</p>':out);
  if(out instanceof Promise){
    try{ $('#m').innerHTML=await out; }
    catch(e){ $('#m').innerHTML='<p class="sub">'+esc(e.message)+'</p>'; }
  }
}
  window.addEventListener('popstate', function(){ wSel=null; movePid=null; renderInPlace(); });
(async function(){
  if(ME){ try{ await reload(); }catch(e){ logout(); return; } }
  render();
})();
</script>
